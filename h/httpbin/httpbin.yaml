spec: "1.0"
name: httpbin
description: HTTP request and response testing service. Echoes back request details for debugging
version: "1.0"
category: data
tags: [testing, debug, http, echo, headers, request]

server:
  type: http
  url: https://httpbin.org
  timeout: 10s

actions:
  - name: get
    description: Make a GET request and see what the server received (headers, args, origin IP)
    output: json
    request:
      method: GET
      path: /get
    assert:
      - type: status
        values: [200]
      - exists: "$.headers"
    params:
      - name: show_env
        type: string
        description: Set to '1' to include environment variables in the response
        in: query

  - name: post
    description: Make a POST request and see the echoed body, headers, and form data
    output: json
    request:
      method: POST
      path: /post
    params:
      - name: data
        type: string
        description: Any data to send in the body
        in: body

  - name: headers
    description: Return the incoming request headers as JSON
    output: json
    request:
      method: GET
      path: /headers
    params: []

  - name: ip
    description: Return the requester's IP address
    output: text
    request:
      method: GET
      path: /ip
    params: []
    transform:
      - type: json
        extract: "$.origin"

  - name: status
    description: Return a response with the specified HTTP status code (useful for testing error handling)
    output: text
    request:
      method: GET
      path: /status/{{code}}
    params:
      - name: code
        type: int
        required: true
        description: "HTTP status code to return, e.g. 200, 404, 500"
        example: 200
        in: path

  - name: delay
    description: Return a response after a specified delay (useful for timeout testing)
    output: json
    request:
      method: GET
      path: /delay/{{seconds}}
    params:
      - name: seconds
        type: int
        required: true
        description: Number of seconds to delay (max 10)
        example: 3
        in: path

  - name: uuid
    description: Generate and return a random UUID
    output: text
    request:
      method: GET
      path: /uuid
    params: []
    transform:
      - type: json
        extract: "$.uuid"
