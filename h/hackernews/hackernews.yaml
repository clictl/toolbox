spec: "1.0"
name: hackernews
description: Hacker News API for accessing top stories, new posts, comments, and user profiles
version: "1.0"
category: news
tags: [hackernews, news, tech, startups, stories, comments]

server:
  type: http
  url: https://hacker-news.firebaseio.com/v0
  timeout: 10s

actions:
  - name: top
    description: Get the IDs of the current top stories on Hacker News
    output: json
    request:
      method: GET
      path: /topstories.json
    params: []
    transform:
      - type: truncate
        max_items: 20

  - name: new
    description: Get the IDs of the newest stories
    output: json
    request:
      method: GET
      path: /newstories.json
    params: []
    transform:
      - type: truncate
        max_items: 20

  - name: best
    description: Get the IDs of the best stories
    output: json
    request:
      method: GET
      path: /beststories.json
    params: []
    transform:
      - type: truncate
        max_items: 20

  - name: item
    description: Get a specific item (story, comment, job, poll) by its ID
    output: json
    request:
      method: GET
      path: /item/{{id}}.json
    params:
      - name: id
        type: int
        required: true
        description: Item ID number
        example: 8863
        in: path

  - name: user
    description: Get a Hacker News user profile by username
    output: json
    request:
      method: GET
      path: /user/{{username}}.json
    params:
      - name: username
        type: string
        required: true
        description: HN username
        example: "pg"
        in: path

  - name: ask
    description: Get the IDs of the current Ask HN stories
    output: json
    request:
      method: GET
      path: /askstories.json
    params: []

  - name: show
    description: Get the IDs of the current Show HN stories
    output: json
    request:
      method: GET
      path: /showstories.json
    params: []
