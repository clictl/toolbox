name: exchangerate
description: Free exchange rate API for currency conversion
version: "1.0"
category: finance
tags: [currency, exchange-rate, forex, conversion]
protocol: rest
owner_name: ExchangeRate-API
website: https://www.exchangerate-api.com
support_url: https://www.exchangerate-api.com/docs

connection:
  base_url: https://v6.exchangerate-api.com
  timeout: 15s
  headers:
    Accept: application/json

auth:
  - type: api_key
    key_env: EXCHANGE_RATE_API_KEY
    inject:
      location: path
      param: api_key

actions:
  - name: latest
    description: Get latest exchange rates for a base currency
    method: GET
    path: /v6/{{api_key}}/latest/{{base}}
    params:
      - name: base
        type: string
        required: true
        description: "Base currency code, e.g. 'USD', 'EUR', 'GBP'"
        in: path

  - name: pair
    description: Convert between two currencies with a specific amount
    method: GET
    path: /v6/{{api_key}}/pair/{{from}}/{{to}}/{{amount}}
    params:
      - name: from
        type: string
        required: true
        description: "Source currency code, e.g. 'USD'"
        in: path
      - name: to
        type: string
        required: true
        description: "Target currency code, e.g. 'EUR'"
        in: path
      - name: amount
        type: string
        required: true
        description: "Amount to convert, e.g. '100'"
        in: path
