name: screenshot
description: Capture desktop or system screenshots of the full screen, specific app or window, or a pixel region
version: "1.0"
category: developer
tags:
- skill
- screenshot
- capture
- desktop
- debugging
protocol: skill
owner_name: OpenAI
namespace: openai
website: https://github.com/openai/skills
support_url: https://github.com/openai/skills/issues
pricing_model: free
license: MIT
source:
  type: github
  repo: openai/skills
  path: skills/.curated/screenshot/
  ref: main
  files:
  - name: LICENSE.txt
  - name: SKILL.md
  - name: agents/openai.yaml
  - name: assets/screenshot-small.svg
  - name: assets/screenshot.png
  - name: scripts/ensure_macos_permissions.sh
  - name: scripts/macos_display_info.swift
  - name: scripts/macos_permissions.swift
  - name: scripts/macos_window_info.swift
  - name: scripts/take_screenshot.ps1
  - name: scripts/take_screenshot.py
platforms:
- name: claude-code
  install_method: skill
  config_path: .claude/skills/
- name: cursor
  install_method: skill
  config_path: .cursor/skills/
- name: codex
  install_method: skill
  config_path: .codex/skills/
- name: vscode
  install_method: copy
  config_path: .github/skills/
skill_metadata:
  author: openai
  version: '1.0'
auth:
- type: none
requires_system:
- name: python3
  check: python3 --version
  brew: python3
