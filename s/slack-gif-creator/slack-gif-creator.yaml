name: slack-gif-creator
description: Toolkit for creating animated GIFs optimized for Slack
version: "1.0"
category: design
tags:
- skill
- gif
- animation
- slack
- messaging
- visual
protocol: skill
owner_name: Anthropic
namespace: anthropic
website: https://github.com/anthropics/skills
support_url: https://github.com/anthropics/skills/issues
pricing_model: free
license: Apache-2.0
source:
  type: github
  repo: anthropics/skills
  path: skills/slack-gif-creator/
  ref: main
  files:
  - name: LICENSE.txt
  - name: SKILL.md
  - name: core/easing.py
  - name: core/frame_composer.py
  - name: core/gif_builder.py
  - name: core/validators.py
  - name: requirements.txt
platforms:
- name: claude-code
  install_method: skill
  config_path: .claude/skills/
- name: cursor
  install_method: skill
  config_path: .cursor/skills/
- name: codex
  install_method: skill
  config_path: .codex/skills/
- name: vscode
  install_method: copy
  config_path: .github/skills/
skill_metadata:
  author: anthropic
  version: '1.0'
auth:
- type: none
requires_system:
- name: python3
  check: "python3 --version"
  brew: python3
runtime:
  language: python
  manager: pip
  dependencies:
  - pillow
  - imageio
  - numpy
