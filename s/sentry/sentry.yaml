name: sentry
description: Sentry API for listing issues, viewing events, and checking project health
version: "1.0"
category: developer
tags: [sentry, errors, debugging, monitoring, issues, events]
protocol: rest
owner_name: Sentry
website: https://sentry.io
support_url: https://docs.sentry.io/api
pricing_model: freemium

connection:
  base_url: https://sentry.io/api/0
  timeout: 15s
  headers:
    Accept: application/json

auth:
  - type: api_key
    key_env: SENTRY_AUTH_TOKEN
    inject:
      location: header
      param: Authorization
      prefix: "Bearer"

actions:
  - name: list-projects
    description: List all projects across your Sentry organizations
    method: GET
    path: /projects/
    params:
      - name: cursor
        type: string
        description: Pagination cursor from a previous response
        in: query
    assert:
      - status: [200]
    transform:
      - extract: "$"
      - truncate: { max_items: 20 }

  - name: list-issues
    description: List issues (error groups) for a specific project
    method: GET
    path: /projects/{{organization_slug}}/{{project_slug}}/issues/
    params:
      - name: organization_slug
        type: string
        required: true
        description: The organization slug
        in: path
      - name: project_slug
        type: string
        required: true
        description: The project slug
        in: path
      - name: query
        type: string
        description: "Search query, e.g. 'is:unresolved' or 'TypeError'"
        in: query
      - name: sort
        type: string
        default: "date"
        description: "Sort order: 'date', 'new', 'priority', 'freq', or 'user'"
        in: query
      - name: cursor
        type: string
        description: Pagination cursor
        in: query
    assert:
      - status: [200]
    transform:
      - extract: "$"
      - truncate: { max_items: 20 }

  - name: get-issue
    description: Get detailed information about a specific issue
    method: GET
    path: /issues/{{issue_id}}/
    params:
      - name: issue_id
        type: string
        required: true
        description: The numeric issue ID
        in: path
    assert:
      - status: [200]
    transform:
      - extract: "$"
      - select: ["id", "title", "culprit", "status", "level", "count", "userCount", "firstSeen", "lastSeen", "platform", "project"]

  - name: list-events
    description: List the latest events (individual error occurrences) for an issue
    method: GET
    path: /issues/{{issue_id}}/events/
    params:
      - name: issue_id
        type: string
        required: true
        description: The numeric issue ID
        in: path
      - name: full
        type: string
        default: "true"
        description: Return the full event body including stack traces
        in: query
    assert:
      - status: [200]
    transform:
      - extract: "$"
      - truncate: { max_items: 20 }
