spec: "1.0"
name: sentry
description: Sentry API for listing issues, viewing events, and checking project health
version: "1.0"
category: developer
tags: [sentry, errors, debugging, monitoring, issues, events]

pricing:
  model: freemium

server:
  type: http
  url: https://sentry.io/api/0
  timeout: 15s
  headers:
    Accept: application/json

auth:
  env: SENTRY_AUTH_TOKEN
  header: Authorization
  value: "Bearer ${SENTRY_AUTH_TOKEN}"

actions:
  - name: list-projects
    description: List all projects across your Sentry organizations
    output: json
    request:
      method: GET
      path: /projects/
    params:
      - name: cursor
        type: string
        description: Pagination cursor from a previous response
        in: query
    assert:
      - type: status
        status: [200]
    transform:
      - type: json
        extract: "$"
      - type: truncate
        max_items: 20

  - name: list-issues
    description: List issues (error groups) for a specific project
    output: json
    request:
      method: GET
      path: /projects/{{organization_slug}}/{{project_slug}}/issues/
    params:
      - name: organization_slug
        type: string
        required: true
        description: The organization slug
        example: "my-org"
        in: path
      - name: project_slug
        type: string
        required: true
        description: The project slug
        example: "my-project"
        in: path
      - name: query
        type: string
        description: "Search query, e.g. 'is:unresolved' or 'TypeError'"
        in: query
      - name: sort
        type: string
        default: "date"
        description: "Sort order: 'date', 'new', 'priority', 'freq', or 'user'"
        in: query
      - name: cursor
        type: string
        description: Pagination cursor
        in: query
    assert:
      - type: status
        status: [200]
    transform:
      - type: json
        extract: "$"
      - type: truncate
        max_items: 20

  - name: get-issue
    description: Get detailed information about a specific issue
    output: json
    request:
      method: GET
      path: /issues/{{issue_id}}/
    params:
      - name: issue_id
        type: string
        required: true
        description: The numeric issue ID
        in: path
    assert:
      - type: status
        status: [200]
    transform:
      - type: json
        extract: "$"
        select: ["id", "title", "culprit", "status", "level", "count", "userCount", "firstSeen", "lastSeen", "platform", "project"]

  - name: list-events
    description: List the latest events (individual error occurrences) for an issue
    output: json
    request:
      method: GET
      path: /issues/{{issue_id}}/events/
    params:
      - name: issue_id
        type: string
        required: true
        description: The numeric issue ID
        in: path
      - name: full
        type: string
        default: "true"
        description: Return the full event body including stack traces
        in: query
    assert:
      - type: status
        status: [200]
    transform:
      - type: json
        extract: "$"
      - type: truncate
        max_items: 20
