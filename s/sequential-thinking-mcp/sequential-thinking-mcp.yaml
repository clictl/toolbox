spec: "1.0"
name: sequential-thinking-mcp
description: MCP server for dynamic problem-solving through sequential thought chains with branching and revision
version: "1.0"
category: ai
tags: [thinking, reasoning, problem-solving, chain-of-thought]

package:
  registry: npm
  name: "@modelcontextprotocol/server-sequential-thinking"
  version: "0.6.2"

server:
  type: stdio
  keep_alive: 120s

instructions: |
  This server provides a structured thinking tool for complex problems.
  Use it to break down multi-step reasoning, explore alternative
  approaches, and revise earlier conclusions. Each thought can branch
  or revise previous steps.

actions:
  - name: sequentialthinking
    description: "Create a dynamic chain of thoughts for problem-solving with branching and revision support"

resources:
  expose: all
