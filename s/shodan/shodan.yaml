spec: "1.0"
name: shodan
description: Shodan API for searching internet-connected devices, open ports, and network intelligence
version: "1.0"
category: security
tags: [shodan, security, network, scanning, iot, reconnaissance]

pricing:
  model: freemium

server:
  type: http
  url: https://api.shodan.io
  timeout: 15s
  headers:
    Accept: application/json

auth:
  env: SHODAN_API_KEY
  param: key
  value: "${SHODAN_API_KEY}"

actions:
  - name: host
    description: Get all available information about a host IP, including open ports, banners, and location
    method: GET
    path: /shodan/host/{{ip}}
    params:
      - name: ip
        type: string
        required: true
        description: "IP address to look up, e.g. '8.8.8.8'"
        in: path
      - name: minify
        type: string
        default: "true"
        description: Return only basic host info (ports, hostnames, location) when true
        in: query
    assert:
      - type: status
        status: [200]
    transform:
      - type: json
        extract: "$"
        select: ["ip_str", "hostnames", "ports", "org", "os", "city", "country_name", "vulns"]

  - name: search
    description: Search for devices matching a Shodan query filter
    method: GET
    path: /shodan/host/search
    params:
      - name: query
        type: string
        required: true
        description: "Shodan search query, e.g. 'apache country:US' or 'port:22 org:google'"
        in: query
      - name: page
        type: int
        default: "1"
        description: Page number for results pagination
        in: query
    assert:
      - type: status
        status: [200]
    transform:
      - type: json
        extract: "$.matches"
      - type: truncate
        max_items: 20

  - name: info
    description: Check your API plan, credits remaining, and usage limits
    method: GET
    path: /api-info
    params: []
    assert:
      - type: status
        status: [200]
    transform:
      - type: json
        extract: "$"
