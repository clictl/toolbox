name: typescript-docs
description: Official TypeScript documentation including handbook, reference, and configuration guides
version: "1.0"
category: documentation
tags: [documentation, typescript, javascript, types, microsoft]
protocol: rest
tool_type: website
owner_name: Microsoft
website: https://www.typescriptlang.org
support_url: https://github.com/microsoft/TypeScript/issues
pricing_model: free

site:
  url: https://www.typescriptlang.org
  sitemap: https://www.typescriptlang.org/sitemap.xml
  content_type: documentation
  preferred_format: html

access:
  method: fetch
  robots_txt: respected

connection:
  base_url: https://www.typescriptlang.org
  headers:
    Accept: text/html

auth:
  - type: none

actions:
  - name: get_page
    description: Fetch a specific TypeScript documentation page
    method: GET
    path: /docs/handbook/{page}
    params:
      - name: page
        type: string
        required: true
        description: Handbook page path (e.g., 2/basic-types, 2/everyday-types, 2/narrowing)
        in: path

  - name: tsconfig_reference
    description: Fetch the TSConfig reference page for compiler options
    method: GET
    path: /tsconfig
    params: []
