spec: '1.0'
name: terraform-registry
description: Terraform Registry API for searching modules and providers used in infrastructure-as-code
version: '1.0'
category: developer
tags:
- terraform
- iac
- infrastructure
- modules
- providers
- hashicorp
server:
  type: http
  url: https://registry.terraform.io/v1
  timeout: 15s
  headers:
    Accept: application/json
actions:
- name: search-modules
  description: Search the Terraform Registry for reusable infrastructure modules
  params:
  - name: q
    type: string
    required: true
    description: Search query for module name or keyword
    in: query
  - name: limit
    type: int
    default: '10'
    description: Number of results to return
    in: query
  - name: offset
    type: int
    default: '0'
    description: Offset for pagination
    in: query
  - name: provider
    type: string
    description: Filter by provider, e.g. 'aws', 'google', 'azurerm'
    in: query
  - name: verified
    type: boolean
    description: Filter to only show verified modules
    in: query
  assert:
  - type: status
    values:
    - 200
  transform:
  - type: extract
    path: $.modules
  - type: truncate
    max_items: 20
  request:
    method: GET
    path: /modules/search
- name: module-info
  description: Get detailed information about a specific Terraform module
  params:
  - name: namespace
    type: string
    required: true
    description: Module namespace (typically the publisher)
    in: path
  - name: name
    type: string
    required: true
    description: Module name
    in: path
  - name: provider
    type: string
    required: true
    description: Target provider, e.g. 'aws', 'google', 'azurerm'
    in: path
  assert:
  - type: status
    values:
    - 200
  transform:
  - type: extract
    path: $
  - type: select
    fields:
    - id
    - name
    - namespace
    - provider
    - description
    - version
    - source
    - published_at
    - downloads
    - verified
  request:
    method: GET
    path: /modules/{{namespace}}/{{name}}/{{provider}}
- name: search-providers
  description: Search for Terraform providers (plugins for managing infrastructure resources)
  params:
  - name: q
    type: string
    required: true
    description: Search query for provider name or keyword
    in: query
  - name: limit
    type: int
    default: '10'
    description: Number of results to return
    in: query
  - name: offset
    type: int
    default: '0'
    description: Offset for pagination
    in: query
  assert:
  - type: status
    values:
    - 200
  transform:
  - type: extract
    path: $.providers
  - type: truncate
    max_items: 20
  request:
    method: GET
    path: /providers/search
