spec: '1.0'
name: todoist
description: Todoist API for listing tasks, projects, labels, and comments
protocol: http
version: '1.0'
category: productivity
tags:
- todoist
- tasks
- todo
- projects
- productivity
pricing:
  model: freemium
server:
  url: https://api.todoist.com/api/v1
  timeout: 15s
  headers:
    Accept: application/json
auth:
  env: TODOIST_TOKEN
  header: 'Authorization: Bearer ${TODOIST_TOKEN}'
actions:
- name: list-tasks
  description: List active tasks with optional filtering by project, label, or filter expression
  method: GET
  path: /tasks
  params:
  - name: project_id
    type: string
    description: Filter tasks by project ID
    in: query
  - name: label
    type: string
    description: Filter tasks by label name
    in: query
  - name: filter
    type: string
    description: Todoist filter expression, e.g. 'today', 'overdue', 'priority 1'
    in: query
  assert:
  - type: status
    status:
    - 200
  transform:
  - type: json
    extract: $
  - type: truncate
    max_items: 20
- name: get-task
  description: Get details for a specific task by its ID
  method: GET
  path: /tasks/{{task_id}}
  params:
  - name: task_id
    type: string
    required: true
    description: The unique task ID
    in: path
  assert:
  - type: status
    status:
    - 200
  transform:
  - type: json
    extract: $
    select:
    - id
    - content
    - description
    - project_id
    - priority
    - due
    - labels
    - is_completed
    - created_at
- name: list-projects
  description: List all projects in your Todoist account
  method: GET
  path: /projects
  params: []
  assert:
  - type: status
    status:
    - 200
  transform:
  - type: json
    extract: $
  - type: truncate
    max_items: 20
- name: get-project
  description: Get details for a specific project by its ID
  method: GET
  path: /projects/{{project_id}}
  params:
  - name: project_id
    type: string
    required: true
    description: The unique project ID
    in: path
  assert:
  - type: status
    status:
    - 200
  transform:
  - type: json
    extract: $
    select:
    - id
    - name
    - color
    - parent_id
    - order
    - is_favorite
    - url
- name: list-labels
  description: List all personal labels in your Todoist account
  method: GET
  path: /labels
  params: []
  assert:
  - type: status
    status:
    - 200
  transform:
  - type: json
    extract: $
  - type: truncate
    max_items: 20
