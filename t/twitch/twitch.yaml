spec: "1.0"
name: twitch
description: Twitch API for searching channels, browsing live streams, and looking up users and games
version: "1.0"
category: communication
tags: [social, twitch, streaming, gaming, live]

server:
  type: http
  url: https://api.twitch.tv/helix
  timeout: 15s
  headers:
    Accept: application/json

auth:
  - env: TWITCH_CLIENT_ID
    header: Client-Id
    value: "${TWITCH_CLIENT_ID}"
  - env: TWITCH_ACCESS_TOKEN
    header: Authorization
    value: "Bearer ${TWITCH_ACCESS_TOKEN}"

actions:
  - name: search-channels
    description: Search for Twitch channels by name or keyword
    request:
      method: GET
      path: /search/channels
    params:
      - name: query
        type: string
        required: true
        description: Search query for channel names
        in: query
      - name: first
        type: int
        default: "20"
        description: Number of results to return (max 100)
        in: query
      - name: live_only
        type: boolean
        default: "false"
        description: Only return channels that are currently live
        in: query
    assert:
      - type: status
        status: [200]
    transform:
      - type: json
        extract: "$.data"
        select: ["id", "display_name", "game_name", "is_live", "title", "broadcaster_language"]
      - type: truncate
        max_items: 20

  - name: streams
    description: Get currently live streams, optionally filtered by game or user
    request:
      method: GET
      path: /streams
    params:
      - name: game_id
        type: string
        description: Filter by game ID
        in: query
      - name: user_login
        type: string
        description: Filter by user login name
        in: query
      - name: language
        type: string
        description: "Filter by stream language, e.g. en, es, fr"
        in: query
      - name: first
        type: int
        default: "20"
        description: Number of results to return (max 100)
        in: query
    assert:
      - type: status
        status: [200]
    transform:
      - type: json
        extract: "$.data"
        select: ["user_name", "game_name", "title", "viewer_count", "language", "started_at", "thumbnail_url"]
      - type: truncate
        max_items: 20

  - name: users
    description: Look up Twitch user profiles by login name or ID
    request:
      method: GET
      path: /users
    params:
      - name: login
        type: string
        description: User login name (can specify multiple, comma-separated)
        in: query
      - name: id
        type: string
        description: User ID (can specify multiple, comma-separated)
        in: query
    assert:
      - type: status
        status: [200]
    transform:
      - type: json
        extract: "$.data"
        select: ["id", "login", "display_name", "description", "profile_image_url", "view_count", "created_at"]

  - name: games
    description: Look up game or category information by name or ID
    request:
      method: GET
      path: /games
    params:
      - name: name
        type: string
        description: Game name to look up (exact match)
        in: query
      - name: id
        type: string
        description: Game ID to look up
        in: query
    assert:
      - type: status
        status: [200]
    transform:
      - type: json
        extract: "$.data"
        select: ["id", "name", "box_art_url", "igdb_id"]

  - name: top-games
    description: Get the most popular games on Twitch by viewer count
    request:
      method: GET
      path: /games/top
    params:
      - name: first
        type: int
        default: "20"
        description: Number of results to return (max 100)
        in: query
    assert:
      - type: status
        status: [200]
    transform:
      - type: json
        extract: "$.data"
        select: ["id", "name", "box_art_url", "igdb_id"]
      - type: truncate
        max_items: 20
