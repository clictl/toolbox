spec: "1.0"
name: telegram-bot
description: Telegram Bot API for sending messages, receiving updates, and managing bot interactions
version: "1.0"
category: communication
tags: [telegram, bot, messaging, chat, notifications]

server:
  type: http
  url: https://api.telegram.org
  timeout: 30s
  headers:
    Accept: application/json
    Content-Type: application/json

auth:
  env: TELEGRAM_BOT_TOKEN
  path: token
  value: "${TELEGRAM_BOT_TOKEN}"

actions:
  - name: get-me
    description: Get basic information about the bot, including its username and ID
    request:
      method: GET
      path: /bot{{token}}/getMe
    params: []
    assert:
      - type: status
        status: [200]
    transform:
      - type: json
        extract: "$.result"

  - name: get-updates
    description: Receive incoming updates (messages, callbacks) for the bot
    request:
      method: GET
      path: /bot{{token}}/getUpdates
    params:
      - name: offset
        type: int
        description: Identifier of the first update to return. Use last update_id + 1 to acknowledge previous updates.
        in: query
      - name: limit
        type: int
        default: "20"
        description: Maximum number of updates to retrieve (1-100)
        in: query
      - name: timeout
        type: int
        default: "0"
        description: Timeout in seconds for long polling (0 for short polling)
        in: query
    assert:
      - type: status
        status: [200]
    transform:
      - type: json
        extract: "$.result"
      - type: truncate
        max_items: 20

  - name: send-message
    description: Send a text message to a chat or user
    request:
      method: POST
      path: /bot{{token}}/sendMessage
    params:
      - name: chat_id
        type: string
        required: true
        description: "Target chat ID or username (e.g. @channelusername)"
        in: body
      - name: text
        type: string
        required: true
        description: Text of the message to send (supports Markdown or HTML via parse_mode)
        in: body
      - name: parse_mode
        type: string
        description: "Formatting mode: 'Markdown', 'MarkdownV2', or 'HTML'"
        in: body
    assert:
      - type: status
        status: [200]
    transform:
      - type: json
        extract: "$.result"
        select: ["message_id", "chat", "date", "text"]

  - name: get-chat
    description: Get information about a chat by its ID
    request:
      method: GET
      path: /bot{{token}}/getChat
    params:
      - name: chat_id
        type: string
        required: true
        description: "Chat ID or username (e.g. @channelusername)"
        in: query
    assert:
      - type: status
        status: [200]
    transform:
      - type: json
        extract: "$.result"
