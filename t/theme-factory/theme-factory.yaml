name: theme-factory
description: Toolkit for styling artifacts like slides, docs, reports, and HTML
  landing pages with a consistent theme
version: "1.0"
category: design
tags:
- skill
- theming
- styling
- slides
- documents
- landing-pages
protocol: skill
owner_name: Anthropic
namespace: anthropic
website: https://github.com/anthropics/skills
support_url: https://github.com/anthropics/skills/issues
pricing_model: free
license: Apache-2.0
source:
  type: github
  repo: anthropics/skills
  path: skills/theme-factory/
  ref: main
  files:
  - name: LICENSE.txt
  - name: SKILL.md
  - name: theme-showcase.pdf
  - name: themes/arctic-frost.md
  - name: themes/botanical-garden.md
  - name: themes/desert-rose.md
  - name: themes/forest-canopy.md
  - name: themes/golden-hour.md
  - name: themes/midnight-galaxy.md
  - name: themes/modern-minimalist.md
  - name: themes/ocean-depths.md
  - name: themes/sunset-boulevard.md
  - name: themes/tech-innovation.md
platforms:
- name: claude-code
  install_method: skill
  config_path: .claude/skills/
- name: cursor
  install_method: skill
  config_path: .cursor/skills/
- name: codex
  install_method: skill
  config_path: .codex/skills/
- name: vscode
  install_method: copy
  config_path: .github/skills/
skill_metadata:
  author: anthropic
  version: '1.0'
auth:
- type: none
