spec: '1.0'
name: nodejs-docs
description: Official Node.js API documentation covering core modules, globals, and runtime APIs
version: '1.0'
category: documentation
tags:
- documentation
- nodejs
- javascript
- runtime
- api
server:
  type: http
  url: https://nodejs.org/docs/latest/api
  headers:
    Accept: application/json
actions:
- name: get_module
  description: Fetch documentation for a specific Node.js core module
  params:
  - name: module
    type: string
    required: true
    description: Core module name (e.g., fs, http, path, stream, child_process)
    in: path
  method: GET
  path: /{module}.json
- name: get_page
  description: Fetch an HTML documentation page for a Node.js core module
  params:
  - name: module
    type: string
    required: true
    description: Core module name (e.g., fs, http, path, stream, child_process)
    in: path
  method: GET
  path: /{module}.html
- name: index
  description: Fetch the documentation index listing all available modules
  params: []
  method: GET
  path: /index.json
