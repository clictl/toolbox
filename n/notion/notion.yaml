spec: "1.0"
name: notion
description: Notion API for pages, databases, and content blocks
version: "1.0"
category: productivity
tags: [notion, notes, databases, wiki, productivity]

server:
  type: http
  url: https://api.notion.com/v1
  timeout: 15s
  headers:
    Accept: application/json
    Notion-Version: "2022-06-28"

auth:
  env: NOTION_TOKEN
  header: Authorization
  value: "Bearer ${NOTION_TOKEN}"

actions:
  - name: search
    description: Search across all pages and databases in the workspace
    output: json
    method: POST
    path: /search
    params:
      - name: query
        type: string
        description: Search query string to filter results
        example: "meeting notes"
        in: body

  - name: page
    description: Retrieve a page and its properties by ID
    output: json
    method: GET
    path: /pages/{{page_id}}
    params:
      - name: page_id
        type: string
        required: true
        description: Notion page ID
        in: path

  - name: databases
    description: Query a database and return matching pages
    output: json
    method: POST
    path: /databases/{{database_id}}/query
    params:
      - name: database_id
        type: string
        required: true
        description: Notion database ID
        in: path
