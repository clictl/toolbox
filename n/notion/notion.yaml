name: notion
description: Notion API for pages, databases, and content blocks
version: "1.0"
category: productivity
tags: [notion, notes, databases, wiki, productivity]
protocol: rest
owner_name: Notion
website: https://notion.so
support_url: https://developers.notion.com

connection:
  base_url: https://api.notion.com/v1
  timeout: 15s
  headers:
    Accept: application/json
    Notion-Version: "2022-06-28"

auth:
  - type: bearer
    key_env: NOTION_TOKEN
    inject:
      location: header
      key: Authorization
      prefix: "Bearer "

actions:
  - name: search
    description: Search across all pages and databases in the workspace
    method: POST
    safe: true
    path: /search
    params:
      - name: query
        type: string
        description: Search query string to filter results
        in: body

  - name: page
    description: Retrieve a page and its properties by ID
    method: GET
    path: /pages/{{page_id}}
    params:
      - name: page_id
        type: string
        required: true
        description: Notion page ID
        in: path

  - name: databases
    description: Query a database and return matching pages
    method: POST
    safe: true
    path: /databases/{{database_id}}/query
    params:
      - name: database_id
        type: string
        required: true
        description: Notion database ID
        in: path
