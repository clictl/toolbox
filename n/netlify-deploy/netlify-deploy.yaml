name: netlify-deploy
description: Deploy web projects to Netlify using the Netlify CLI
version: "1.0"
category: devops
tags:
- skill
- netlify
- deployment
- hosting
- frontend
protocol: skill
owner_name: OpenAI
namespace: openai
website: https://github.com/openai/skills
support_url: https://github.com/openai/skills/issues
pricing_model: free
license: MIT
source:
  type: github
  repo: openai/skills
  path: skills/.curated/netlify-deploy/
  ref: main
  files:
  - name: LICENSE.txt
  - name: SKILL.md
  - name: agents/openai.yaml
  - name: assets/netlify-small.svg
  - name: assets/netlify.png
  - name: references/cli-commands.md
  - name: references/deployment-patterns.md
  - name: references/netlify-toml.md
platforms:
- name: claude-code
  install_method: skill
  config_path: .claude/skills/
- name: cursor
  install_method: skill
  config_path: .cursor/skills/
- name: codex
  install_method: skill
  config_path: .codex/skills/
- name: vscode
  install_method: copy
  config_path: .github/skills/
skill_metadata:
  author: openai
  version: '1.0'
auth:
- type: none
requires_system:
- name: git
  check: git --version
  brew: git
- name: node
  check: node --version
  brew: node
