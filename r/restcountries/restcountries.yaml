spec: '1.0'
name: restcountries
description: Information about countries including population, languages, currencies, flags, and borders
protocol: http
version: '1.0'
category: geo
tags:
- countries
- geography
- population
- languages
- currencies
- flags
server:
  url: https://restcountries.com/v3.1
  timeout: 10s
actions:
- name: all
  description: List all countries with basic info
  output: json
  method: GET
  path: /all
  params:
  - name: fields
    type: string
    default: name,capital,population,region
    description: Comma-separated fields to return
    in: query
  transform:
  - type: truncate
    max_items: 20
- name: name
  description: Search for countries by name (partial match supported)
  output: json
  method: GET
  path: /name/{name}
  params:
  - name: name
    type: string
    required: true
    description: Country name or partial name
    example: germany
  - name: fields
    default: name,capital,population,region
    in: query
- name: code
  description: Get a country by its ISO 3166-1 alpha-2 or alpha-3 code
  output: json
  method: GET
  path: /alpha/{{code}}
  params:
  - name: code
    type: string
    required: true
    description: Country code, e.g. 'US', 'GB', 'DEU'
    example: US
    in: path
- name: currency
  description: Search for countries that use a specific currency
  output: json
  method: GET
  path: /currency/{{currency}}
  params:
  - name: currency
    type: string
    required: true
    description: Currency code, e.g. 'usd', 'eur', 'jpy'
    example: eur
    in: path
- name: language
  description: Search for countries where a specific language is spoken
  output: json
  method: GET
  path: /lang/{{language}}
  params:
  - name: language
    type: string
    required: true
    description: Language code, e.g. 'spanish', 'french', 'por'
    example: spanish
    in: path
- name: region
  description: Search for countries by region or subregion
  output: json
  method: GET
  path: /region/{{region}}
  params:
  - name: region
    type: string
    required: true
    description: 'Region name: africa, americas, asia, europe, oceania'
    example: europe
    in: path
- name: capital
  description: Search for countries by capital city name
  output: json
  method: GET
  path: /capital/{{capital}}
  params:
  - name: capital
    type: string
    required: true
    description: Capital city name, e.g. 'london', 'tokyo'
    example: tokyo
    in: path
