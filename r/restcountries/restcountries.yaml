name: restcountries
description: Information about countries including population, languages, currencies, flags, and borders
version: "1.0"
category: geo
tags: [countries, geography, population, languages, currencies, flags]
protocol: rest
owner_name: REST Countries
website: https://restcountries.com
support_url: https://restcountries.com

connection:
  base_url: https://restcountries.com/v3.1
  timeout: 10s

auth:
  - type: none

actions:
  - name: all
    description: List all countries with basic info
    method: GET
    path: /all
    params:
      - name: fields
        type: string
        description: "Comma-separated fields to return, e.g. 'name,capital,population,flags'"
        in: query

  - name: name
    description: Search for countries by name (partial match supported)
    method: GET
    path: /name/{{name}}
    params:
      - name: name
        type: string
        required: true
        description: "Country name or partial name, e.g. 'united', 'germany'"
        in: path
      - name: fullText
        type: string
        description: "Set to 'true' for exact name match only"
        in: query

  - name: code
    description: Get a country by its ISO 3166-1 alpha-2 or alpha-3 code
    method: GET
    path: /alpha/{{code}}
    params:
      - name: code
        type: string
        required: true
        description: "Country code, e.g. 'US', 'GB', 'DEU'"
        in: path

  - name: currency
    description: Search for countries that use a specific currency
    method: GET
    path: /currency/{{currency}}
    params:
      - name: currency
        type: string
        required: true
        description: "Currency code, e.g. 'usd', 'eur', 'jpy'"
        in: path

  - name: language
    description: Search for countries where a specific language is spoken
    method: GET
    path: /lang/{{language}}
    params:
      - name: language
        type: string
        required: true
        description: "Language code, e.g. 'spanish', 'french', 'por'"
        in: path

  - name: region
    description: Search for countries by region or subregion
    method: GET
    path: /region/{{region}}
    params:
      - name: region
        type: string
        required: true
        description: "Region name: africa, americas, asia, europe, oceania"
        in: path

  - name: capital
    description: Search for countries by capital city name
    method: GET
    path: /capital/{{capital}}
    params:
      - name: capital
        type: string
        required: true
        description: "Capital city name, e.g. 'london', 'tokyo'"
        in: path
