spec: "1.0"
name: recraft
description: Recraft AI API for generating and transforming images with multiple artistic styles
version: "1.0"
category: ai
tags: [ai, image-generation, recraft]

pricing:
  model: paid

server:
  type: http
  url: https://external.api.recraft.ai/v1
  timeout: 60s
  headers:
    Accept: application/json
    Content-Type: application/json

auth:
  env: RECRAFT_API_KEY
  header: Authorization
  value: "Bearer ${RECRAFT_API_KEY}"

actions:
  - name: generate
    description: Generate an image from a text prompt
    method: POST
    path: /images/generations
    params:
      - name: prompt
        type: string
        required: true
        description: Text description of the image to generate
        in: body
      - name: style
        type: string
        default: "realistic_image"
        description: "Style preset: realistic_image, digital_illustration, vector_illustration, icon"
        in: body
      - name: size
        type: string
        default: "1024x1024"
        description: "Image dimensions, e.g. 1024x1024, 1365x1024, 1024x1365"
        in: body
      - name: n
        type: int
        default: "1"
        description: Number of images to generate (1-4)
        in: body
    body:
      prompt: "{{prompt}}"
      style: "{{style}}"
      size: "{{size}}"
      n: "{{n}}"
    assert:
      - type: status
        status: [200]
    transform:
      - type: json
        extract: "$.data"
        select: ["url", "b64_json"]

  - name: vectorize
    description: Convert a raster image to SVG vector format
    method: POST
    path: /images/vectorize
    params:
      - name: image_url
        type: string
        required: true
        description: URL of the image to vectorize
        in: body
    body:
      image_url: "{{image_url}}"
    assert:
      - type: status
        status: [200]
    transform:
      - type: json
        extract: "$.data"

  - name: remove-background
    description: Remove the background from an image
    method: POST
    path: /images/removeBackground
    params:
      - name: image_url
        type: string
        required: true
        description: URL of the image to process
        in: body
    body:
      image_url: "{{image_url}}"
    assert:
      - type: status
        status: [200]
    transform:
      - type: json
        extract: "$.data"
