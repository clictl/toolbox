spec: '1.0'
name: azure-mcp
description: MCP server for Azure cloud services management and resource operations
protocol: mcp
version: '1.0'
category: cloud
tags:
- mcp
- azure
- cloud
- microsoft
- infrastructure
- devops
auth:
  env: AZURE_SUBSCRIPTION_ID
package:
  registry: npm
  name: '@azure/mcp'
  version: 2.0.0-beta.32
  manager: npx
prompts:
  system: 'This server provides access to Azure cloud services. Use it for

    managing Azure resources, deployments, and configurations.

    Always confirm destructive operations with the user.

    '
resources:
  expose: all
install_mode:
  default: mcp
  allow_mcp: true
  allow_skill: true
  keep_alive: 300s
actions:
- name: list_resources
  description: List Azure resources in a subscription
  params:
  - name: resource_group
    type: string
    required: false
    description: Filter by resource group
  - name: resource_type
    type: string
    required: false
    description: Filter by resource type
- name: get_resource
  description: Get details of a specific Azure resource
  params:
  - name: resource_id
    type: string
    required: true
    description: Azure resource ID
- name: list_resource_groups
  description: List resource groups in the subscription
- name: create_resource
  description: Create a new Azure resource
  params:
  - name: resource_group
    type: string
    required: true
    description: Resource group name
  - name: resource_type
    type: string
    required: true
    description: Azure resource type
  - name: name
    type: string
    required: true
    description: Resource name
  - name: location
    type: string
    required: true
    description: Azure region
  - name: properties
    type: string
    required: false
    description: JSON object of resource properties
  mutable: true
- name: delete_resource
  description: Delete an Azure resource
  params:
  - name: resource_id
    type: string
    required: true
    description: Azure resource ID
  mutable: true
- name: list_deployments
  description: List deployments in a resource group
  params:
  - name: resource_group
    type: string
    required: true
    description: Resource group name
- name: get_deployment_status
  description: Get the status of a deployment
  params:
  - name: resource_group
    type: string
    required: true
    description: Resource group name
  - name: deployment_name
    type: string
    required: true
    description: Deployment name
