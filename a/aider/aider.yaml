name: aider
description: AI pair programming in your terminal, works with multiple LLM providers
version: "1.0"
category: ai
tags: [ai, coding, pair-programming, aider, llm, git]
protocol: cli
tool_type: cli
owner_name: Aider
website: https://aider.chat
support_url: https://github.com/Aider-AI/aider/issues
pricing_model: free

auth:
  - type: none

actions:
  - name: chat
    description: Start an interactive pair programming session
    method: command
    path: aider
    params:
      - name: files
        type: string
        required: false
        description: Files to include in the chat context
        in: arg

  - name: run
    description: Run a single prompt against specified files
    method: command
    path: aider
    params:
      - name: message
        type: string
        required: true
        description: The instruction to execute
        in: flag
      - name: files
        type: string
        required: false
        description: Files to edit
        in: arg
