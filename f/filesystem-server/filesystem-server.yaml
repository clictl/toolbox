spec: "1.0"
name: filesystem-server
description: MCP server for secure local filesystem access with file reading, writing, and directory operations
version: "1.0"
category: developer
tags: [filesystem, files, directories, read, write]

package:
  registry: npm
  name: "@modelcontextprotocol/server-filesystem"
  version: "0.6.2"

server:
  type: stdio
  keep_alive: 300s

instructions: |
  This server provides filesystem access scoped to the allowed directories.
  Always confirm with the user before writing, editing, or moving files.
  Use read_file to inspect contents before making modifications.

actions:
  - name: read_file
    description: "Read the complete contents of a file"
  - name: read_multiple_files
    description: "Read contents of multiple files simultaneously"
  - name: write_file
    description: "Create or overwrite a file with new content"
    mutable: true
    instructions: "Confirm with the user before overwriting existing files."
  - name: edit_file
    description: "Make line-based edits to a text file"
    mutable: true
    instructions: "Prefer edit_file over write_file for modifying existing files."
  - name: create_directory
    description: "Create a new directory or nested directories"
    mutable: true
  - name: list_directory
    description: "List files and directories at a given path"
  - name: directory_tree
    description: "Get a recursive tree view of files and directories"
  - name: move_file
    description: "Move or rename files and directories"
    mutable: true
    instructions: "Verify the destination does not already exist."
  - name: search_files
    description: "Recursively search for files matching a pattern"
  - name: get_file_info
    description: "Get detailed metadata about a file or directory"

transforms:
  read_file:
    - truncate: { max_length: 10000 }
  read_multiple_files:
    - truncate: { max_length: 20000 }
  directory_tree:
    - truncate: { max_length: 8000 }
  search_files:
    - truncate: { max_items: 100 }

permissions:
  filesystem:
    - read: "/home"
    - write: "/home"

resources:
  expose: all
  resource_transforms:
    "file://**":
      - truncate: { max_length: 10000 }
