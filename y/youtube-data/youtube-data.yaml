spec: "1.0"
name: youtube-data
description: YouTube Data API for searching videos, viewing channel info, and reading video metadata
version: "1.0"
category: media
tags: [youtube, video, search, channels, google]

server:
  type: http
  url: https://www.googleapis.com/youtube/v3
  timeout: 15s
  headers:
    Accept: application/json

auth:
  env: YOUTUBE_API_KEY
  param: key
  value: "${YOUTUBE_API_KEY}"

actions:
  - name: search
    description: Search YouTube for videos, channels, or playlists by keyword
    request:
      method: GET
      path: /search
    params:
      - name: q
        type: string
        required: true
        description: Search query string
        in: query
      - name: part
        type: string
        default: "snippet"
        description: "Comma-separated list of resource parts to include, e.g. 'snippet'"
        in: query
      - name: type
        type: string
        default: "video"
        description: "Resource type filter: 'video', 'channel', or 'playlist'"
        in: query
      - name: maxResults
        type: int
        default: "10"
        description: Maximum number of results (1 to 50)
        in: query
      - name: order
        type: string
        default: "relevance"
        description: "Sort order: 'date', 'rating', 'relevance', 'title', or 'viewCount'"
        in: query
      - name: channelId
        type: string
        description: Filter results to a specific channel
        in: query
      - name: pageToken
        type: string
        description: Token for pagination from a previous response
        in: query
    assert:
      - type: status
        status: [200]
    transform:
      - type: json
        extract: "$.items"
      - type: truncate
        max_items: 20

  - name: get-video
    description: Get detailed metadata for one or more videos by ID
    request:
      method: GET
      path: /videos
    params:
      - name: id
        type: string
        required: true
        description: "Comma-separated video IDs"
        in: query
      - name: part
        type: string
        default: "snippet,statistics,contentDetails"
        description: "Comma-separated resource parts: 'snippet', 'statistics', 'contentDetails', 'status'"
        in: query
    assert:
      - type: status
        status: [200]
    transform:
      - type: json
        extract: "$.items"
      - type: truncate
        max_items: 20

  - name: get-channel
    description: Get metadata and statistics for a YouTube channel
    request:
      method: GET
      path: /channels
    params:
      - name: id
        type: string
        description: The channel ID to look up
        in: query
      - name: forHandle
        type: string
        description: "Look up a channel by its handle, e.g. '@mkbhd'"
        in: query
      - name: part
        type: string
        default: "snippet,statistics"
        description: "Comma-separated resource parts: 'snippet', 'statistics', 'contentDetails', 'brandingSettings'"
        in: query
    assert:
      - type: status
        status: [200]
    transform:
      - type: json
        extract: "$.items"
      - type: truncate
        max_items: 20

  - name: list-playlists
    description: List playlists for a specific channel
    request:
      method: GET
      path: /playlists
    params:
      - name: channelId
        type: string
        required: true
        description: The channel ID to list playlists for
        in: query
      - name: part
        type: string
        default: "snippet,contentDetails"
        description: Comma-separated resource parts to include
        in: query
      - name: maxResults
        type: int
        default: "20"
        description: Maximum number of results
        in: query
      - name: pageToken
        type: string
        description: Token for pagination
        in: query
    assert:
      - type: status
        status: [200]
    transform:
      - type: json
        extract: "$.items"
      - type: truncate
        max_items: 20
