name: kubernetes-mcp
description: MCP server for Kubernetes and OpenShift cluster management via native API access
version: "1.0"
category: devops
tags: [mcp, kubernetes, k8s, openshift, containers, cluster, devops]
protocol: mcp
owner_name: Red Hat
website: https://github.com/containers/kubernetes-mcp-server
support_url: https://github.com/containers/kubernetes-mcp-server/issues
pricing_model: free
license: Apache-2.0

package:
  registry: npm
  name: "kubernetes-mcp-server"
  version: "0.0.59"
  manager: npx

auth:
  - type: api_key
    key_env: KUBECONFIG
    inject:
      location: env
      param: KUBECONFIG

tools:
  expose:
    - name: list_pods
      description: "List pods in a namespace"
      params:
        - name: namespace
          type: string
          required: false
          description: "Kubernetes namespace (default: default)"
    - name: get_pod
      description: "Get details of a specific pod"
      params:
        - name: name
          type: string
          required: true
          description: "Pod name"
        - name: namespace
          type: string
          required: false
          description: "Kubernetes namespace"
    - name: list_deployments
      description: "List deployments in a namespace"
      params:
        - name: namespace
          type: string
          required: false
          description: "Kubernetes namespace"
    - name: get_deployment
      description: "Get details of a specific deployment"
      params:
        - name: name
          type: string
          required: true
          description: "Deployment name"
        - name: namespace
          type: string
          required: false
          description: "Kubernetes namespace"
    - name: list_services
      description: "List services in a namespace"
      params:
        - name: namespace
          type: string
          required: false
          description: "Kubernetes namespace"
    - name: get_logs
      description: "Get logs from a pod"
      params:
        - name: name
          type: string
          required: true
          description: "Pod name"
        - name: namespace
          type: string
          required: false
          description: "Kubernetes namespace"
        - name: container
          type: string
          required: false
          description: "Container name for multi-container pods"
        - name: tail
          type: int
          required: false
          description: "Number of lines from the end of logs"
    - name: apply_resource
      description: "Apply a Kubernetes resource from YAML"
      destructive: true
      params:
        - name: manifest
          type: string
          required: true
          description: "YAML manifest to apply"
    - name: delete_resource
      description: "Delete a Kubernetes resource"
      destructive: true
      params:
        - name: kind
          type: string
          required: true
          description: "Resource kind (e.g. Pod, Deployment, Service)"
        - name: name
          type: string
          required: true
          description: "Resource name"
        - name: namespace
          type: string
          required: false
          description: "Kubernetes namespace"
    - name: list_namespaces
      description: "List all namespaces in the cluster"
    - name: get_events
      description: "Get events in a namespace"
      params:
        - name: namespace
          type: string
          required: false
          description: "Kubernetes namespace"

prompts:
  system: |
    This server provides native Kubernetes API access. Use it for
    managing pods, deployments, services, and other cluster resources.
    Always confirm before applying or deleting resources.

resources:
  expose: all

install_mode:
  default: mcp
  allow_mcp: true
  allow_skill: true
  keep_alive: 300s
