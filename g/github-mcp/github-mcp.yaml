spec: '1.0'
name: github-mcp
description: MCP server for GitHub API access with repository management, issues, pull requests, code search, and more
protocol: mcp
version: '1.0'
category: developer
tags:
- mcp
- github
- git
- repos
- issues
- pull-requests
- code-search
auth:
  env: GITHUB_PERSONAL_ACCESS_TOKEN
package:
  registry: npm
  name: '@modelcontextprotocol/server-github'
  version: 2025.4.8
  manager: npx
sandbox:
  network:
    allow:
    - api.github.com
  env:
    allow:
    - GITHUB_PERSONAL_ACCESS_TOKEN
prompts:
  system: 'This server provides GitHub API access. Use search tools to find

    repositories and code before making changes. When creating issues

    or pull requests, write clear titles and descriptions.

    '
  tool_instructions:
    create_pull_request: Include a descriptive title and summary of changes.
    push_files: Always create a branch first. Never push directly to main.
    merge_pull_request: Check PR status and reviews before merging.
resources:
  expose: all
install_mode:
  default: both
  allow_mcp: true
  allow_skill: true
  keep_alive: 300s
actions:
- name: create_or_update_file
  description: Create or update a single file in a GitHub repository
  params:
  - name: owner
    type: string
    required: true
    description: Repository owner (username or organization)
  - name: message
    type: string
    required: true
    description: Commit message
  - name: repo
    type: string
    required: true
    description: Repository name
  - name: path
    type: string
    required: true
    description: Path where to create/update the file
  - name: branch
    type: string
    required: true
    description: Branch to create/update the file in
  - name: content
    type: string
    required: true
    description: Content of the file
  - name: sha
    type: string
    description: SHA of the file being replaced (required when updating existing files)
  mutable: true
- name: search_repositories
  description: Search for GitHub repositories
  params:
  - name: query
    type: string
    required: true
    description: Search query (see GitHub search syntax)
  - name: page
    type: number
    description: 'Page number for pagination (default: 1)'
  - name: perPage
    type: number
    description: 'Number of results per page (default: 30, max: 100)'
- name: create_repository
  description: Create a new GitHub repository in your account
  params:
  - name: name
    type: string
    required: true
    description: Repository name
  - name: description
    type: string
    description: Repository description
  - name: private
    type: boolean
    description: Whether the repository should be private
  - name: autoInit
    type: boolean
    description: Initialize with README.md
  mutable: true
- name: get_file_contents
  description: Get the contents of a file or directory from a GitHub repository
  params:
  - name: owner
    type: string
    required: true
    description: Repository owner (username or organization)
  - name: repo
    type: string
    required: true
    description: Repository name
  - name: path
    type: string
    required: true
    description: Path to the file or directory
  - name: branch
    type: string
    description: Branch to get contents from
- name: push_files
  description: Push multiple files to a GitHub repository in a single commit
  params:
  - name: owner
    type: string
    required: true
    description: Repository owner (username or organization)
  - name: message
    type: string
    required: true
    description: Commit message
  - name: repo
    type: string
    required: true
    description: Repository name
  - name: branch
    type: string
    required: true
    description: Branch to push to (e.g., 'main' or 'master')
  - name: files
    type: array
    required: true
    description: Array of files to push
  mutable: true
- name: create_issue
  description: Create a new issue in a GitHub repository
  params:
  - name: owner
    type: string
    required: true
  - name: repo
    type: string
    required: true
  - name: title
    type: string
    required: true
  - name: body
    type: string
  - name: assignees
    type: array
  - name: milestone
    type: number
  - name: labels
    type: array
  mutable: true
- name: create_pull_request
  description: Create a new pull request in a GitHub repository
  params:
  - name: owner
    type: string
    required: true
    description: Repository owner (username or organization)
  - name: repo
    type: string
    required: true
    description: Repository name
  - name: base
    type: string
    required: true
    description: The name of the branch you want the changes pulled into
  - name: title
    type: string
    required: true
    description: Pull request title
  - name: head
    type: string
    required: true
    description: The name of the branch where your changes are implemented
  - name: body
    type: string
    description: Pull request body/description
  - name: draft
    type: boolean
    description: Whether to create the pull request as a draft
  - name: maintainer_can_modify
    type: boolean
    description: Whether maintainers can modify the pull request
  mutable: true
- name: fork_repository
  description: Fork a GitHub repository to your account or specified organization
  params:
  - name: owner
    type: string
    required: true
    description: Repository owner (username or organization)
  - name: repo
    type: string
    required: true
    description: Repository name
  - name: organization
    type: string
    description: 'Optional: organization to fork to (defaults to your personal account)'
  mutable: true
- name: create_branch
  description: Create a new branch in a GitHub repository
  params:
  - name: owner
    type: string
    required: true
    description: Repository owner (username or organization)
  - name: repo
    type: string
    required: true
    description: Repository name
  - name: branch
    type: string
    required: true
    description: Name for the new branch
  - name: from_branch
    type: string
    description: 'Optional: source branch to create from (defaults to the repository''s default branch)'
  mutable: true
- name: list_commits
  description: Get list of commits of a branch in a GitHub repository
  params:
  - name: owner
    type: string
    required: true
  - name: repo
    type: string
    required: true
  - name: sha
    type: string
  - name: page
    type: number
  - name: perPage
    type: number
- name: list_issues
  description: List issues in a GitHub repository with filtering options
  params:
  - name: owner
    type: string
    required: true
  - name: repo
    type: string
    required: true
  - name: direction
    type: string
  - name: labels
    type: array
  - name: page
    type: number
  - name: per_page
    type: number
  - name: since
    type: string
  - name: sort
    type: string
  - name: state
    type: string
- name: update_issue
  description: Update an existing issue in a GitHub repository
  params:
  - name: owner
    type: string
    required: true
  - name: repo
    type: string
    required: true
  - name: issue_number
    type: number
    required: true
  - name: title
    type: string
  - name: body
    type: string
  - name: assignees
    type: array
  - name: milestone
    type: number
  - name: labels
    type: array
  - name: state
    type: string
  mutable: true
- name: add_issue_comment
  description: Add a comment to an existing issue
  params:
  - name: owner
    type: string
    required: true
  - name: repo
    type: string
    required: true
  - name: issue_number
    type: number
    required: true
  - name: body
    type: string
    required: true
  mutable: true
- name: search_code
  description: Search for code across GitHub repositories
  params:
  - name: q
    type: string
    required: true
  - name: order
    type: string
  - name: page
    type: number
  - name: per_page
    type: number
- name: search_issues
  description: Search for issues and pull requests across GitHub repositories
  params:
  - name: q
    type: string
    required: true
  - name: order
    type: string
  - name: page
    type: number
  - name: per_page
    type: number
  - name: sort
    type: string
- name: search_users
  description: Search for users on GitHub
  params:
  - name: q
    type: string
    required: true
  - name: order
    type: string
  - name: page
    type: number
  - name: per_page
    type: number
  - name: sort
    type: string
- name: get_issue
  description: Get details of a specific issue in a GitHub repository.
  params:
  - name: owner
    type: string
    required: true
  - name: repo
    type: string
    required: true
  - name: issue_number
    type: number
    required: true
- name: get_pull_request
  description: Get details of a specific pull request
  params:
  - name: owner
    type: string
    required: true
    description: Repository owner (username or organization)
  - name: repo
    type: string
    required: true
    description: Repository name
  - name: pull_number
    type: number
    required: true
    description: Pull request number
- name: list_pull_requests
  description: List and filter repository pull requests
  params:
  - name: owner
    type: string
    required: true
    description: Repository owner (username or organization)
  - name: repo
    type: string
    required: true
    description: Repository name
  - name: state
    type: string
    description: State of the pull requests to return
  - name: head
    type: string
    description: Filter by head user or head organization and branch name
  - name: base
    type: string
    description: Filter by base branch name
  - name: sort
    type: string
    description: What to sort results by
  - name: direction
    type: string
    description: The direction of the sort
  - name: per_page
    type: number
    description: Results per page (max 100)
  - name: page
    type: number
    description: Page number of the results
- name: create_pull_request_review
  description: Create a review on a pull request
  params:
  - name: owner
    type: string
    required: true
    description: Repository owner (username or organization)
  - name: repo
    type: string
    required: true
    description: Repository name
  - name: pull_number
    type: number
    required: true
    description: Pull request number
  - name: body
    type: string
    required: true
    description: The body text of the review
  - name: event
    type: string
    required: true
    description: The review action to perform
  - name: commit_id
    type: string
    description: The SHA of the commit that needs a review
  - name: comments
    type: array
    description: Comments to post as part of the review (specify either position or line, not both)
  mutable: true
- name: merge_pull_request
  description: Merge a pull request
  params:
  - name: owner
    type: string
    required: true
    description: Repository owner (username or organization)
  - name: repo
    type: string
    required: true
    description: Repository name
  - name: pull_number
    type: number
    required: true
    description: Pull request number
  - name: commit_title
    type: string
    description: Title for the automatic commit message
  - name: commit_message
    type: string
    description: Extra detail to append to automatic commit message
  - name: merge_method
    type: string
    description: Merge method to use
  mutable: true
- name: get_pull_request_files
  description: Get the list of files changed in a pull request
  params:
  - name: owner
    type: string
    required: true
    description: Repository owner (username or organization)
  - name: repo
    type: string
    required: true
    description: Repository name
  - name: pull_number
    type: number
    required: true
    description: Pull request number
- name: get_pull_request_status
  description: Get the combined status of all status checks for a pull request
  params:
  - name: owner
    type: string
    required: true
    description: Repository owner (username or organization)
  - name: repo
    type: string
    required: true
    description: Repository name
  - name: pull_number
    type: number
    required: true
    description: Pull request number
- name: update_pull_request_branch
  description: Update a pull request branch with the latest changes from the base branch
  params:
  - name: owner
    type: string
    required: true
    description: Repository owner (username or organization)
  - name: repo
    type: string
    required: true
    description: Repository name
  - name: pull_number
    type: number
    required: true
    description: Pull request number
  - name: expected_head_sha
    type: string
    description: The expected SHA of the pull request's HEAD ref
  mutable: true
- name: get_pull_request_comments
  description: Get the review comments on a pull request
  params:
  - name: owner
    type: string
    required: true
    description: Repository owner (username or organization)
  - name: repo
    type: string
    required: true
    description: Repository name
  - name: pull_number
    type: number
    required: true
    description: Pull request number
- name: get_pull_request_reviews
  description: Get the reviews on a pull request
  params:
  - name: owner
    type: string
    required: true
    description: Repository owner (username or organization)
  - name: repo
    type: string
    required: true
    description: Repository name
  - name: pull_number
    type: number
    required: true
    description: Pull request number
transforms:
  search_repositories:
  - truncate:
      max_items: 20
  search_code:
  - truncate:
      max_items: 30
  search_issues:
  - truncate:
      max_items: 20
  search_users:
  - truncate:
      max_items: 20
  list_issues:
  - truncate:
      max_items: 30
  list_commits:
  - truncate:
      max_items: 30
  list_pull_requests:
  - truncate:
      max_items: 20
  get_pull_request_files:
  - truncate:
      max_items: 50
  get_pull_request_comments:
  - truncate:
      max_items: 30
  get_pull_request_reviews:
  - truncate:
      max_items: 20
