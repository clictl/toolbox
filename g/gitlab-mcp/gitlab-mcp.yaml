spec: '1.0'
name: gitlab-mcp
description: MCP server for GitLab API access with project, issue, and merge request management
protocol: mcp
version: '1.0'
category: developer
tags:
- mcp
- gitlab
- git
- code
- repos
- issues
- merge-requests
- ci-cd
auth:
  env: GITLAB_TOKEN
package:
  registry: npm
  name: '@modelcontextprotocol/server-gitlab'
  version: 2025.4.25
  manager: npx
prompts:
  system: 'This server provides access to the GitLab API. Use it for browsing

    projects, managing issues and merge requests, and viewing CI/CD pipelines.

    Confirm before creating or modifying resources.

    '
resources:
  expose: all
install_mode:
  default: mcp
  allow_mcp: true
  allow_skill: true
  keep_alive: 300s
actions:
- name: list_projects
  description: List GitLab projects
  params:
  - name: search
    type: string
    required: false
    description: Search query for project names
- name: get_project
  description: Get details of a specific project
  params:
  - name: project_id
    type: string
    required: true
    description: Project ID or path
- name: list_issues
  description: List issues in a project
  params:
  - name: project_id
    type: string
    required: true
    description: Project ID or path
  - name: state
    type: string
    required: false
    description: 'Filter by state: opened, closed, or all'
- name: get_issue
  description: Get details of a specific issue
  params:
  - name: project_id
    type: string
    required: true
    description: Project ID or path
  - name: issue_iid
    type: int
    required: true
    description: Issue IID
- name: create_issue
  description: Create a new issue
  params:
  - name: project_id
    type: string
    required: true
    description: Project ID or path
  - name: title
    type: string
    required: true
    description: Issue title
  - name: description
    type: string
    required: false
    description: Issue description
  mutable: true
- name: list_merge_requests
  description: List merge requests in a project
  params:
  - name: project_id
    type: string
    required: true
    description: Project ID or path
  - name: state
    type: string
    required: false
    description: 'Filter by state: opened, closed, merged, or all'
- name: create_merge_request
  description: Create a new merge request
  params:
  - name: project_id
    type: string
    required: true
    description: Project ID or path
  - name: title
    type: string
    required: true
    description: Merge request title
  - name: source_branch
    type: string
    required: true
    description: Source branch
  - name: target_branch
    type: string
    required: true
    description: Target branch
  mutable: true
- name: get_file_contents
  description: Get contents of a file from a repository
  params:
  - name: project_id
    type: string
    required: true
    description: Project ID or path
  - name: file_path
    type: string
    required: true
    description: File path in the repository
  - name: ref
    type: string
    required: false
    description: Branch or commit ref
- name: list_pipelines
  description: List CI/CD pipelines for a project
  params:
  - name: project_id
    type: string
    required: true
    description: Project ID or path
