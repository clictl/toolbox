name: gemini-cli
description: Google's AI-powered command-line coding agent
version: "1.0"
category: ai
tags: [ai, gemini, google, coding, agent, llm]
protocol: cli
tool_type: cli
owner_name: Google
website: https://github.com/google-gemini/gemini-cli
support_url: https://github.com/google-gemini/gemini-cli/issues
pricing_model: freemium

auth:
  - type: none

actions:
  - name: chat
    description: Start an interactive coding session with Gemini
    method: command
    path: gemini
    params:
      - name: prompt
        type: string
        required: false
        description: Initial prompt to send to Gemini
        in: arg

  - name: run
    description: Run a prompt non-interactively
    method: command
    path: gemini
    params:
      - name: prompt
        type: string
        required: true
        description: The prompt to execute
        in: arg
