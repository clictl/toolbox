name: github
description: GitHub REST API for accessing public repository data, user profiles, issues, and more
version: "1.0"
category: developer
tags: [github, git, code, repos, issues, pull-requests, developer]
protocol: rest
owner_name: GitHub
website: https://github.com
support_url: https://docs.github.com/en/rest
pricing_model: freemium

connection:
  base_url: https://api.github.com
  timeout: 15s
  headers:
    Accept: application/vnd.github+json
    X-GitHub-Api-Version: "2022-11-28"

auth:
  - type: bearer
    key_env: GITHUB_TOKEN
    inject:
      location: header
      key: Authorization
      prefix: "Bearer "

actions:
  - name: user
    description: Get a GitHub user's public profile including bio, repos count, and follower stats
    method: GET
    path: /users/{{username}}
    params:
      - name: username
        type: string
        required: true
        description: GitHub username
        in: path

  - name: repos
    description: List public repositories for a user sorted by stars, updated date, or name
    method: GET
    path: /users/{{username}}/repos
    params:
      - name: username
        type: string
        required: true
        description: GitHub username
        in: path
      - name: sort
        type: string
        default: updated
        description: "Sort by: created, updated, pushed, full_name"
        in: query
      - name: direction
        type: string
        default: desc
        description: "Sort direction: asc or desc"
        in: query
      - name: per_page
        type: int
        default: "10"
        description: Results per page (max 100)
        in: query
    transform:
      - select: ["full_name", "description", "language", "stargazers_count", "updated_at"]
      - rename:
          stargazers_count: stars
      - template: |
          {{range .}}{{.full_name}} ({{.language}}, {{.stars}} stars)
            {{.description}}
          {{end}}

  - name: repo
    description: Get detailed information about a specific repository
    method: GET
    path: /repos/{{owner}}/{{repo}}
    params:
      - name: owner
        type: string
        required: true
        description: Repository owner (user or org)
        in: path
      - name: repo
        type: string
        required: true
        description: Repository name
        in: path

  - name: issues
    description: List open issues for a repository
    method: GET
    path: /repos/{{owner}}/{{repo}}/issues
    params:
      - name: owner
        type: string
        required: true
        in: path
      - name: repo
        type: string
        required: true
        in: path
      - name: state
        type: string
        default: open
        description: "Filter by state: open, closed, all"
        in: query
      - name: labels
        type: string
        description: Comma-separated list of label names to filter by
        in: query
      - name: per_page
        type: int
        default: "10"
        in: query

  - name: search_repos
    description: Search for repositories across all of GitHub by keyword
    method: GET
    path: /search/repositories
    params:
      - name: q
        type: string
        required: true
        description: "Search query, e.g. 'language:go stars:>100 cli'"
        in: query
      - name: sort
        type: string
        description: "Sort by: stars, forks, help-wanted-issues, updated"
        in: query
      - name: order
        type: string
        default: desc
        in: query
      - name: per_page
        type: int
        default: "10"
        in: query
    transform:
      extract: "$.items"
