spec: '1.0'
name: github
description: GitHub REST API for accessing public repository data, user profiles, issues, and more
protocol: http
version: '1.0'
category: developer
tags:
- github
- git
- code
- repos
- issues
- pull-requests
- developer
pricing:
  model: freemium
server:
  url: https://api.github.com
  timeout: 15s
  headers:
    Accept: application/vnd.github+json
    X-GitHub-Api-Version: '2022-11-28'
auth:
  env: GITHUB_TOKEN
  header: 'Authorization: Bearer ${GITHUB_TOKEN}'
actions:
- name: user
  description: Get a GitHub user's public profile including bio, repos count, and follower stats
  output: json
  method: GET
  path: /users/{{username}}
  params:
  - name: username
    type: string
    required: true
    description: GitHub username
    example: octocat
    in: path
- name: repos
  description: List public repositories for a user sorted by stars, updated date, or name
  output: text
  method: GET
  path: /users/{{username}}/repos
  params:
  - name: username
    type: string
    required: true
    description: GitHub username
    example: octocat
    in: path
  - name: sort
    type: string
    default: updated
    description: 'Sort by: created, updated, pushed, full_name'
    in: query
  - name: direction
    type: string
    default: desc
    description: 'Sort direction: asc or desc'
    in: query
  - name: per_page
    type: int
    default: '10'
    description: Results per page (max 100)
    in: query
  transform:
  - type: json
    select:
    - full_name
    - description
    - language
    - stargazers_count
    - updated_at
    rename:
      stargazers_count: stars
  - type: template
    template: "{{range .}}{{.full_name}} ({{.language}}, {{.stars}} stars)\n  {{.description}}\n{{end}}\n"
- name: repo
  description: Get detailed information about a specific repository
  output: json
  method: GET
  path: /repos/{{owner}}/{{repo}}
  params:
  - name: owner
    type: string
    required: true
    description: Repository owner (user or org)
    example: facebook
    in: path
  - name: repo
    type: string
    required: true
    description: Repository name
    example: react
    in: path
- name: issues
  description: List open issues for a repository
  output: json
  method: GET
  path: /repos/{{owner}}/{{repo}}/issues
  params:
  - name: owner
    type: string
    required: true
    example: facebook
    in: path
  - name: repo
    type: string
    required: true
    example: react
    in: path
  - name: state
    type: string
    default: open
    description: 'Filter by state: open, closed, all'
    in: query
  - name: labels
    type: string
    description: Comma-separated list of label names to filter by
    in: query
  - name: per_page
    type: int
    default: '10'
    in: query
- name: search_repos
  description: Search for repositories across all of GitHub by keyword
  output: json
  method: GET
  path: /search/repositories
  params:
  - name: q
    type: string
    required: true
    description: Search query, e.g. 'language:go stars:>100 cli'
    example: language:python stars:>1000 http
    in: query
  - name: sort
    type: string
    description: 'Sort by: stars, forks, help-wanted-issues, updated'
    in: query
  - name: order
    type: string
    default: desc
    in: query
  - name: per_page
    type: int
    default: '10'
    in: query
  transform:
  - type: json
    extract: $.items
