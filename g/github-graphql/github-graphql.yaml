name: github-graphql
description: GitHub GraphQL API for querying repositories, issues, pull requests, and user data with precise field selection
version: "1.0"
category: developer
tags: [github, graphql, code, repos, issues, developer]
protocol: graphql

connection:
  url: https://api.github.com/graphql
  headers:
    Accept: application/json

auth:
  - type: bearer
    key_env: GITHUB_TOKEN
    inject:
      location: header
      key: Authorization
      prefix: "Bearer "

actions:
  - name: my_repos
    description: List your repositories sorted by stars with descriptions
    pre_transform:
      - template_body: |
          {"query": "{{.query}}"}
    query: |
      query($first: Int!) {
        viewer {
          repositories(first: $first, orderBy: {field: STARGAZERS, direction: DESC}) {
            nodes {
              name
              description
              stargazerCount
              primaryLanguage { name }
              url
              updatedAt
            }
          }
        }
      }
    params:
      - name: first
        type: int
        default: "10"
        description: Number of repositories to return
        variable: first
    transform:
      extract: "$.data.viewer.repositories.nodes"

  - name: repo_issues
    description: Get open issues for a specific repository with labels and authors
    query: |
      query($owner: String!, $name: String!, $first: Int!, $states: [IssueState!]) {
        repository(owner: $owner, name: $name) {
          issues(first: $first, states: $states, orderBy: {field: CREATED_AT, direction: DESC}) {
            nodes {
              title
              number
              state
              createdAt
              author { login }
              labels(first: 5) { nodes { name } }
            }
          }
        }
      }
    params:
      - name: owner
        type: string
        required: true
        description: Repository owner
        variable: owner
      - name: name
        type: string
        required: true
        description: Repository name
        variable: name
      - name: first
        type: int
        default: "10"
        variable: first
      - name: states
        type: string
        default: "OPEN"
        description: "Issue states: OPEN, CLOSED"
        variable: states
    transform:
      extract: "$.data.repository.issues.nodes"

  - name: user_profile
    description: Get a GitHub user's profile including contribution stats and pinned repos
    query: |
      query($login: String!) {
        user(login: $login) {
          name
          login
          bio
          company
          location
          followers { totalCount }
          following { totalCount }
          repositories { totalCount }
          contributionsCollection {
            totalCommitContributions
            totalPullRequestContributions
            totalIssueContributions
          }
          pinnedItems(first: 6, types: REPOSITORY) {
            nodes {
              ... on Repository {
                name
                description
                stargazerCount
                primaryLanguage { name }
              }
            }
          }
        }
      }
    params:
      - name: login
        type: string
        required: true
        description: GitHub username
        variable: login
    transform:
      extract: "$.data.user"

  - name: search_repos
    description: Search GitHub repositories by keyword with star counts and language
    query: |
      query($query: String!, $first: Int!) {
        search(query: $query, type: REPOSITORY, first: $first) {
          repositoryCount
          nodes {
            ... on Repository {
              nameWithOwner
              description
              stargazerCount
              forkCount
              primaryLanguage { name }
              url
            }
          }
        }
      }
    params:
      - name: query
        type: string
        required: true
        description: "Search query, e.g. 'language:go topic:cli stars:>50'"
        variable: query
      - name: first
        type: int
        default: "10"
        variable: first
    transform:
      extract: "$.data.search.nodes"
