spec: '1.0'
name: github-graphql
description: GitHub GraphQL API for querying repositories, issues, pull requests, and user data with precise field selection
protocol: http
version: '1.0'
category: developer
tags:
- github
- graphql
- code
- repos
- issues
- developer
server:
  url: https://api.github.com/graphql
  headers:
    Accept: application/json
auth:
  env: GITHUB_TOKEN
  header: 'Authorization: Bearer ${GITHUB_TOKEN}'
actions:
- name: my_repos
  description: List your repositories sorted by stars with descriptions
  pre_transform:
  - template_body: '{"query": "{{.query}}"}

      '
  query: "query($first: Int!) {\n  viewer {\n    repositories(first: $first, orderBy: {field: STARGAZERS, direction: DESC})\
    \ {\n      nodes {\n        name\n        description\n        stargazerCount\n        primaryLanguage { name }\n    \
    \    url\n        updatedAt\n      }\n    }\n  }\n}\n"
  params:
  - name: first
    type: int
    default: '10'
    description: Number of repositories to return
    variable: first
  transform:
  - type: json
    extract: $.data.viewer.repositories.nodes
- name: repo_issues
  description: Get open issues for a specific repository with labels and authors
  query: "query($owner: String!, $name: String!, $first: Int!, $states: [IssueState!]) {\n  repository(owner: $owner, name:\
    \ $name) {\n    issues(first: $first, states: $states, orderBy: {field: CREATED_AT, direction: DESC}) {\n      nodes {\n\
    \        title\n        number\n        state\n        createdAt\n        author { login }\n        labels(first: 5) {\
    \ nodes { name } }\n      }\n    }\n  }\n}\n"
  params:
  - name: owner
    type: string
    required: true
    description: Repository owner
    variable: owner
  - name: name
    type: string
    required: true
    description: Repository name
    variable: name
  - name: first
    type: int
    default: '10'
    variable: first
  - name: states
    type: string
    default: OPEN
    description: 'Issue states: OPEN, CLOSED'
    variable: states
  transform:
  - type: json
    extract: $.data.repository.issues.nodes
- name: user_profile
  description: Get a GitHub user's profile including contribution stats and pinned repos
  query: "query($login: String!) {\n  user(login: $login) {\n    name\n    login\n    bio\n    company\n    location\n   \
    \ followers { totalCount }\n    following { totalCount }\n    repositories { totalCount }\n    contributionsCollection\
    \ {\n      totalCommitContributions\n      totalPullRequestContributions\n      totalIssueContributions\n    }\n    pinnedItems(first:\
    \ 6, types: REPOSITORY) {\n      nodes {\n        ... on Repository {\n          name\n          description\n       \
    \   stargazerCount\n          primaryLanguage { name }\n        }\n      }\n    }\n  }\n}\n"
  params:
  - name: login
    type: string
    required: true
    description: GitHub username
    variable: login
  transform:
  - type: json
    extract: $.data.user
- name: search_repos
  description: Search GitHub repositories by keyword with star counts and language
  query: "query($query: String!, $first: Int!) {\n  search(query: $query, type: REPOSITORY, first: $first) {\n    repositoryCount\n\
    \    nodes {\n      ... on Repository {\n        nameWithOwner\n        description\n        stargazerCount\n        forkCount\n\
    \        primaryLanguage { name }\n        url\n      }\n    }\n  }\n}\n"
  params:
  - name: query
    type: string
    required: true
    description: Search query, e.g. 'language:go topic:cli stars:>50'
    variable: query
  - name: first
    type: int
    default: '10'
    variable: first
  transform:
  - type: json
    extract: $.data.search.nodes
