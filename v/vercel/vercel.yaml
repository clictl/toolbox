spec: "1.0"
name: vercel
description: Vercel API for listing deployments, projects, domains, and checking build status
version: "1.0"
category: developer
tags: [vercel, deployments, hosting, serverless, frontend, ci-cd]

pricing:
  model: freemium

server:
  type: http
  url: https://api.vercel.com
  timeout: 15s
  headers:
    Accept: application/json

auth:
  env: VERCEL_TOKEN
  header: Authorization
  value: "Bearer ${VERCEL_TOKEN}"

actions:
  - name: list-deployments
    description: List recent deployments across all projects or for a specific project
    method: GET
    path: /v6/deployments
    params:
      - name: projectId
        type: string
        description: Filter deployments by project ID
        in: query
      - name: state
        type: string
        description: "Filter by state: 'BUILDING', 'ERROR', 'INITIALIZING', 'QUEUED', 'READY', 'CANCELED'"
        in: query
      - name: limit
        type: int
        default: "20"
        description: Maximum number of deployments to return
        in: query
      - name: target
        type: string
        description: "Filter by target environment: 'production' or 'preview'"
        in: query
    assert:
      - type: status
        status: [200]
    transform:
      - type: json
        extract: "$.deployments"
      - type: truncate
        max_items: 20

  - name: get-deployment
    description: Get detailed information about a specific deployment
    method: GET
    path: /v13/deployments/{{deployment_id}}
    params:
      - name: deployment_id
        type: string
        required: true
        description: The deployment ID or URL
        in: path
    assert:
      - type: status
        status: [200]
    transform:
      - type: json
        extract: "$"
        select: ["id", "name", "url", "state", "readyState", "target", "createdAt", "buildingAt", "ready", "meta"]

  - name: list-projects
    description: List all projects in your Vercel account or team
    method: GET
    path: /v9/projects
    params:
      - name: search
        type: string
        description: Search projects by name
        in: query
      - name: limit
        type: int
        default: "20"
        description: Maximum number of projects to return
        in: query
    assert:
      - type: status
        status: [200]
    transform:
      - type: json
        extract: "$.projects"
      - type: truncate
        max_items: 20

  - name: get-project
    description: Get details for a specific project by ID or name
    method: GET
    path: /v9/projects/{{project_id}}
    params:
      - name: project_id
        type: string
        required: true
        description: The project ID or name
        in: path
    assert:
      - type: status
        status: [200]
    transform:
      - type: json
        extract: "$"
        select: ["id", "name", "framework", "nodeVersion", "buildCommand", "outputDirectory", "link", "latestDeployments"]

  - name: list-domains
    description: List all domains configured for a project
    method: GET
    path: /v9/projects/{{project_id}}/domains
    params:
      - name: project_id
        type: string
        required: true
        description: The project ID or name
        in: path
      - name: limit
        type: int
        default: "20"
        description: Maximum number of domains to return
        in: query
    assert:
      - type: status
        status: [200]
    transform:
      - type: json
        extract: "$.domains"
      - type: truncate
        max_items: 20
