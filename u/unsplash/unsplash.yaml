name: unsplash
description: Unsplash API for searching and browsing high-quality photos and photographer profiles
version: "1.0"
category: media
tags: [unsplash, photos, images, stock, photography]
protocol: rest
owner_name: Unsplash
website: https://unsplash.com
support_url: https://unsplash.com/documentation
pricing_model: free

connection:
  base_url: https://api.unsplash.com
  timeout: 15s
  headers:
    Accept: application/json

auth:
  - type: api_key
    key_env: UNSPLASH_ACCESS_KEY
    inject:
      location: header
      param: Authorization
      prefix: "Client-ID"

actions:
  - name: search-photos
    description: Search for photos by keyword or phrase
    method: GET
    path: /search/photos
    params:
      - name: query
        type: string
        required: true
        description: Search query string
        in: query
      - name: page
        type: int
        default: "1"
        description: Page number for pagination
        in: query
      - name: per_page
        type: int
        default: "10"
        description: Number of results per page (max 30)
        in: query
      - name: orientation
        type: string
        description: "Filter by orientation: 'landscape', 'portrait', or 'squarish'"
        in: query
      - name: color
        type: string
        description: "Filter by color tone: 'black_and_white', 'black', 'white', 'yellow', 'orange', 'red', 'purple', 'magenta', 'green', 'teal', 'blue'"
        in: query
      - name: order_by
        type: string
        default: "relevant"
        description: "Sort order: 'relevant' or 'latest'"
        in: query
    assert:
      - status: [200]
    transform:
      - extract: "$.results"
      - truncate: { max_items: 20 }

  - name: get-photo
    description: Get full details for a specific photo by its ID
    method: GET
    path: /photos/{{photo_id}}
    params:
      - name: photo_id
        type: string
        required: true
        description: The unique photo ID
        in: path
    assert:
      - status: [200]
    transform:
      - extract: "$"
      - select: ["id", "description", "alt_description", "urls", "width", "height", "likes", "user", "created_at", "tags"]

  - name: list-photos
    description: Browse the editorial feed of curated photos
    method: GET
    path: /photos
    params:
      - name: page
        type: int
        default: "1"
        description: Page number
        in: query
      - name: per_page
        type: int
        default: "10"
        description: Number of results per page (max 30)
        in: query
      - name: order_by
        type: string
        default: "latest"
        description: "Sort order: 'latest', 'oldest', or 'popular'"
        in: query
    assert:
      - status: [200]
    transform:
      - extract: "$"
      - truncate: { max_items: 20 }

  - name: get-user
    description: Get a photographer's public profile and stats
    method: GET
    path: /users/{{username}}
    params:
      - name: username
        type: string
        required: true
        description: The photographer's Unsplash username
        in: path
    assert:
      - status: [200]
    transform:
      - extract: "$"
      - select: ["id", "username", "name", "bio", "location", "total_photos", "total_likes", "total_collections", "portfolio_url"]
