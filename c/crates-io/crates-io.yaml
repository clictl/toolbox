spec: "1.0"
name: crates-io
description: Crates.io API for searching Rust crates, viewing crate metadata, and listing versions
version: "1.0"
category: developer
tags: [rust, crates, cargo, packages, registry]

server:
  type: http
  url: https://crates.io/api/v1
  timeout: 15s
  headers:
    Accept: application/json
    User-Agent: clictl/1.0 (https://github.com/clictl)

actions:
  - name: search
    description: Search for Rust crates by keyword with sorting and pagination
    output: text
    request:
      method: GET
      path: /crates
    params:
      - name: q
        type: string
        required: true
        description: Search query string
        example: "serde"
        in: query
      - name: per_page
        type: int
        default: "10"
        description: Number of results per page (max 100)
        in: query
      - name: page
        type: int
        default: "1"
        description: Page number for pagination
        in: query
      - name: sort
        type: string
        description: "Sort by: relevance, downloads, recent-downloads, recent-updates, new"
        in: query
    assert:
      - type: status
        values: [200]
    transform:
      - extract: "$.crates"
      - type: json
        select: ["name", "max_stable_version", "downloads", "description"]
      - type: truncate
        max_items: 10
      - type: format
        template: "- {name} v{max_stable_version} ({downloads} downloads)\n  {description}"

  - name: crate-info
    description: Get detailed information about a specific Rust crate including description, downloads, and links
    output: json
    request:
      method: GET
      path: /crates/{{name}}
    params:
      - name: name
        type: string
        required: true
        description: Crate name as published on crates.io
        example: "tokio"
        in: path
    assert:
      - type: status
        values: [200]
    transform:
      - extract: "$.crate"

  - name: crate-versions
    description: List all published versions of a Rust crate with download counts and metadata
    output: json
    request:
      method: GET
      path: /crates/{{name}}/versions
    params:
      - name: name
        type: string
        required: true
        description: Crate name
        example: "tokio"
        in: path
    assert:
      - type: status
        values: [200]
    transform:
      - extract: "$.versions"
      - type: truncate
        max_items: 20
