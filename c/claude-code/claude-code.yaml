spec: '1.0'
name: claude-code
description: Anthropic's agentic coding tool that lives in your terminal
protocol: command
version: '1.0'
category: ai
tags:
- ai
- claude
- coding
- agent
- anthropic
- llm
pricing:
  model: paid
actions:
- name: chat
  description: Start an interactive coding session with Claude
  params:
  - name: prompt
    type: string
    required: false
    description: Initial prompt to send to Claude
    in: arg
- name: run
  description: Run a single prompt non-interactively and exit
  params:
  - name: prompt
    type: string
    required: true
    description: The prompt to execute
    in: arg
  - name: print
    type: bool
    required: false
    description: Print the response without interactive mode
    in: flag
