spec: '1.0'
name: cve
description: NIST National Vulnerability Database API for searching CVEs and viewing vulnerability details
protocol: http
version: '1.0'
category: security
tags:
- cve
- nvd
- vulnerabilities
- security
- nist
- cpe
server:
  url: https://services.nvd.nist.gov/rest/json/cves/2.0
  timeout: 30s
  headers:
    Accept: application/json
actions:
- name: search
  description: Search the NVD for CVEs by keyword, date range, or severity
  output: text
  method: GET
  path: /
  params:
  - name: keywordSearch
    type: string
    description: Keyword or phrase to search for in CVE descriptions
    example: log4j
    in: query
  - name: cvssV3Severity
    type: string
    description: 'Filter by CVSS v3 severity: ''LOW'', ''MEDIUM'', ''HIGH'', or ''CRITICAL'''
    in: query
  - name: pubStartDate
    type: string
    description: Start of publication date range in ISO 8601, e.g. '2024-01-01T00:00:00.000'
    in: query
  - name: pubEndDate
    type: string
    description: End of publication date range in ISO 8601
    in: query
  - name: resultsPerPage
    type: int
    default: '20'
    description: Number of results per page (max 2000)
    in: query
  - name: startIndex
    type: int
    default: '0'
    description: Index of the first result to return
    in: query
  assert:
  - type: status
    values:
    - 200
  transform:
  - extract: $.vulnerabilities
  - type: json
    select:
    - cve.id
    - cve.descriptions
    - cve.metrics
    rename:
      cve.id: id
      cve.descriptions: descriptions
      cve.metrics: metrics
  - type: truncate
    max_items: 20
  - type: template
    template: '{{range .}}- {{.id}}{{if .metrics}}{{if .metrics.cvssMetricV31}} ({{(index .metrics.cvssMetricV31 0).cvssData.baseSeverity}}){{else
      if .metrics.cvssMetricV2}} ({{(index .metrics.cvssMetricV2 0).baseSeverity}}){{end}}{{end}} - {{if .descriptions}}{{(index
      .descriptions 0).value}}{{end}}

      {{end}}

      '
- name: get-cve
  description: Get full details for a specific CVE by its ID
  output: text
  method: GET
  path: /
  params:
  - name: cveId
    type: string
    required: true
    description: The CVE identifier, e.g. 'CVE-2024-1234'
    example: CVE-2021-44228
    in: query
  assert:
  - type: status
    values:
    - 200
  transform:
  - extract: $.vulnerabilities[0].cve
  - type: json
    select:
    - id
    - descriptions
    - metrics
    - references
    - published
    - lastModified
  - type: template
    template: '# {{.id}}

      Published: {{.published}}


      {{if .descriptions}}{{(index .descriptions 0).value}}{{end}}

      '
- name: search-by-cpe
  description: Search for CVEs affecting a specific product using its CPE name
  output: text
  method: GET
  path: /
  params:
  - name: cpeName
    type: string
    required: true
    description: CPE 2.3 match string, e.g. 'cpe:2.3:a:apache:log4j:2.14.1:*:*:*:*:*:*:*'
    example: cpe:2.3:a:apache:log4j:2.14.1:*:*:*:*:*:*:*
    in: query
  - name: resultsPerPage
    type: int
    default: '20'
    description: Number of results per page
    in: query
  assert:
  - type: status
    values:
    - 200
  transform:
  - extract: $.vulnerabilities
  - type: json
    select:
    - cve.id
    - cve.descriptions
    - cve.metrics
    rename:
      cve.id: id
      cve.descriptions: descriptions
      cve.metrics: metrics
  - type: truncate
    max_items: 20
  - type: template
    template: '{{range .}}- {{.id}}{{if .metrics}}{{if .metrics.cvssMetricV31}} ({{(index .metrics.cvssMetricV31 0).cvssData.baseSeverity}}){{else
      if .metrics.cvssMetricV2}} ({{(index .metrics.cvssMetricV2 0).baseSeverity}}){{end}}{{end}} - {{if .descriptions}}{{(index
      .descriptions 0).value}}{{end}}

      {{end}}

      '
