name: puppeteer-mcp
description: MCP server for browser automation with Puppeteer for navigation, screenshots, and interaction
version: "1.0"
category: developer
tags: [mcp, puppeteer, browser, automation, screenshots, testing]
protocol: mcp
owner_name: Anthropic
website: https://github.com/modelcontextprotocol/servers
support_url: https://github.com/modelcontextprotocol/servers/issues
pricing_model: free
license: MIT

package:
  registry: npm
  name: "@modelcontextprotocol/server-puppeteer"
  version: "0.6.2"
  manager: npx

auth:
  - type: none

tools:
  expose:
    - name: puppeteer_navigate
      description: "Navigate the browser to a URL"
      params:
        - name: url
          type: string
          required: true
          description: "URL to navigate to"
    - name: puppeteer_screenshot
      description: "Take a screenshot of the current page or a specific element"
      params:
        - name: name
          type: string
          required: true
          description: "Screenshot identifier"
        - name: selector
          type: string
          required: false
          description: "CSS selector for element screenshot"
        - name: width
          type: int
          required: false
          description: "Screenshot width in pixels"
        - name: height
          type: int
          required: false
          description: "Screenshot height in pixels"
    - name: puppeteer_click
      description: "Click an element on the page using CSS selector"
      destructive: true
      params:
        - name: selector
          type: string
          required: true
          description: "CSS selector of the element to click"
    - name: puppeteer_fill
      description: "Fill in an input field with text"
      destructive: true
      params:
        - name: selector
          type: string
          required: true
          description: "CSS selector of the input element"
        - name: value
          type: string
          required: true
          description: "Text to fill into the input"
    - name: puppeteer_select
      description: "Select a value from a dropdown element"
      destructive: true
      params:
        - name: selector
          type: string
          required: true
          description: "CSS selector of the select element"
        - name: value
          type: string
          required: true
          description: "Option value to select"
    - name: puppeteer_hover
      description: "Hover over an element on the page"
      params:
        - name: selector
          type: string
          required: true
          description: "CSS selector of the element to hover over"
prompts:
  system: |
    This server controls a headless browser via Puppeteer. Use
    puppeteer_navigate to load pages, puppeteer_screenshot to see
    the current state, and interaction tools to fill forms and click
    elements. Always take a screenshot after navigation to verify
    the page loaded correctly.
  tool_instructions:
    puppeteer_navigate: "Take a screenshot after navigating to verify the page loaded."

resources:
  expose: all

install_mode:
  default: mcp
  allow_mcp: true
  allow_skill: true
  keep_alive: 300s
