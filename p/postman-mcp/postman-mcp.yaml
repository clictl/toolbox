spec: '1.0'
name: postman-mcp
description: MCP server for Postman API platform with collection management, test execution, and environment access
version: '1.0'
category: developer
tags:
- mcp
- postman
- api
- testing
- collections
- environments
auth:
  env: POSTMAN_API_KEY
  inject: env
pricing:
  model: freemium
package:
  registry: npm
  name: '@postman/mcp-server'
  version: 0.1.0
  manager: npx
tools:
  expose:
  - name: list_collections
    description: List all Postman collections in the workspace
    params:
    - name: workspace_id
      type: string
      required: false
      description: Filter by workspace ID
  - name: get_collection
    description: Get details of a specific collection including requests and folders
    params:
    - name: collection_id
      type: string
      required: true
      description: Postman collection ID
  - name: run_collection
    description: Run all requests in a collection using the Postman runner
    params:
    - name: collection_id
      type: string
      required: true
      description: Collection ID to run
    - name: environment_id
      type: string
      required: false
      description: Environment ID to use during the run
  - name: get_environment
    description: Get environment variables and their values
    params:
    - name: environment_id
      type: string
      required: true
      description: Postman environment ID
  - name: list_environments
    description: List all environments in the workspace
    params:
    - name: workspace_id
      type: string
      required: false
      description: Filter by workspace ID
  - name: list_workspaces
    description: List available Postman workspaces
prompts:
  system: |
    This server provides access to the Postman API platform. Use it for
    browsing API collections, running test suites, and managing environments.
    Confirm before running collections as they may trigger real API calls.
resources:
  expose: all
install_mode:
  default: mcp
  allow_mcp: true
  allow_skill: true
