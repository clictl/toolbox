spec: '1.0'
name: ollama
description: Local LLM inference via Ollama. Run AI models like Llama, Mistral, and Gemma on your machine
protocol: http
version: '1.0'
category: ai
tags:
- ai
- llm
- local
- ollama
- inference
- chat
- embedding
server:
  url: http://localhost:11434
  timeout: 120s
  headers:
    Content-Type: application/json
  requires:
  - name: ollama
    url: https://ollama.com/download
    check: ollama --version
actions:
- name: generate
  description: Generate a text completion from a prompt using a local model
  params:
  - name: model
    type: string
    required: true
    description: Model name, e.g. 'llama3.2', 'mistral', 'gemma2'
    in: body
  - name: prompt
    type: string
    required: true
    description: The input prompt to generate a response for
    in: body
  - name: stream
    type: bool
    default: 'false'
    description: Stream the response token by token
    in: body
  safe: true
  method: POST
  path: /api/generate
- name: chat
  description: Send a chat message and get a response (single turn)
  send:
    type: json
    template: "{\n  \"model\": \"{{model}}\",\n  \"messages\": [{\"role\": \"user\", \"content\": \"{{message}}\"}],\n  \"\
      stream\": false\n}\n"
  params:
  - name: model
    type: string
    required: true
    description: Model name, e.g. 'llama3.2'
  - name: message
    type: string
    required: true
    description: Chat message to send
  transform:
  - type: extract
    path: $.message.content
  safe: true
  method: POST
  path: /api/chat
- name: list
  description: List all models currently downloaded on your machine
  params: []
  transform:
  - type: extract
    path: $.models
  method: GET
  path: /api/tags
- name: embeddings
  description: Generate vector embeddings for text using a local model
  params:
  - name: model
    type: string
    required: true
    description: Model name, e.g. 'nomic-embed-text'
    in: body
  - name: prompt
    type: string
    required: true
    description: Text to generate embeddings for
    in: body
  safe: true
  method: POST
  path: /api/embeddings
