name: browser-mcp
description: MCP server for AI web browser automation using Browserbase and Stagehand
version: "1.0"
category: developer
tags: [mcp, browser, automation, web, scraping, browserbase, stagehand]
protocol: mcp
owner_name: Browserbase
website: https://github.com/browserbase/mcp-server-browserbase
support_url: https://github.com/browserbase/mcp-server-browserbase/issues
pricing_model: freemium
license: Apache-2.0

package:
  registry: npm
  name: "@browserbasehq/mcp-server-browserbase"
  version: "2.4.3"
  manager: npx

auth:
  - type: api_key
    key_env: BROWSERBASE_API_KEY
    inject:
      location: env
      param: BROWSERBASE_API_KEY

tools:
  expose:
    - name: browserbase_create_session
      description: "Create a new cloud browser session"
      params:
        - name: project_id
          type: string
          required: false
          description: "Browserbase project ID"
    - name: browserbase_navigate
      description: "Navigate the browser to a URL"
      params:
        - name: url
          type: string
          required: true
          description: "URL to navigate to"
    - name: browserbase_screenshot
      description: "Take a screenshot of the current page"
    - name: browserbase_click
      description: "Click an element on the page"
      destructive: true
      params:
        - name: selector
          type: string
          required: true
          description: "CSS selector of the element to click"
    - name: browserbase_fill
      description: "Fill in an input field"
      destructive: true
      params:
        - name: selector
          type: string
          required: true
          description: "CSS selector of the input element"
        - name: value
          type: string
          required: true
          description: "Text to fill into the input"
    - name: browserbase_get_content
      description: "Get the text content of the page"
    - name: browserbase_close_session
      description: "Close the current browser session"
      destructive: true

prompts:
  system: |
    This server provides browser automation via Browserbase cloud browsers.
    Use it for web scraping, testing, and interacting with web pages.
    Sessions run in the cloud so no local browser is needed.

resources:
  expose: all

install_mode:
  default: mcp
  allow_mcp: true
  allow_skill: true
  keep_alive: 300s
