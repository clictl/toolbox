spec: "1.0"
name: deepl
description: DeepL Translation API for high-quality machine translation across 30+ languages
version: "1.0"
category: ai
tags: [deepl, translation, language, localization, nlp]

pricing:
  model: freemium

server:
  type: http
  url: https://api-free.deepl.com/v2
  timeout: 15s
  headers:
    Accept: application/json
    Content-Type: application/json

auth:
  env: DEEPL_API_KEY
  header: Authorization
  value: "DeepL-Auth-Key ${DEEPL_API_KEY}"

actions:
  - name: translate
    description: Translate text into a target language with automatic source language detection
    method: POST
    path: /translate
    params:
      - name: text
        type: string
        required: true
        description: Text to translate (multiple sentences supported)
        in: body
      - name: target_lang
        type: string
        required: true
        description: "Target language code, e.g. 'EN', 'DE', 'FR', 'ES', 'JA', 'ZH'"
        in: body
      - name: source_lang
        type: string
        description: "Source language code (auto-detected if omitted), e.g. 'EN', 'DE', 'FR'"
        in: body
      - name: formality
        type: string
        description: "Formality level: 'default', 'more', 'less', 'prefer_more', 'prefer_less'"
        in: body
    assert:
      - type: status
        status: [200]
      - type: exists
        path: "$.translations"
    transform:
      - type: json
        extract: "$.translations"

  - name: languages
    description: List all supported languages for translation
    method: GET
    path: /languages
    params:
      - name: type
        type: string
        description: "Filter by language type: 'source' or 'target'"
        in: query
    assert:
      - type: status
        status: [200]
    transform:
      - type: json
        extract: "$"

  - name: usage
    description: Check current API usage and character limits for your account
    method: GET
    path: /usage
    params: []
    assert:
      - type: status
        status: [200]
    transform:
      - type: json
        extract: "$"
