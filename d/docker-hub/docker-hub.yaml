spec: "1.0"
name: docker-hub
description: Docker Hub API for searching container images and browsing repository tags
version: "1.0"
category: developer
tags: [docker, containers, images, registry, devops]

server:
  type: http
  url: https://hub.docker.com/v2
  timeout: 15s
  headers:
    Accept: application/json

actions:
  - name: search
    description: Search Docker Hub for container images by keyword
    output: text
    request:
      method: GET
      path: /search/repositories
    params:
      - name: query
        type: string
        required: true
        description: Search query string
        example: "nginx"
        in: query
      - name: page_size
        type: int
        default: "10"
        description: Number of results per page (max 100)
        in: query
      - name: page
        type: int
        default: "1"
        description: Page number for pagination
        in: query
    assert:
      - type: status
        values: [200]
    transform:
      - on: request
        rename_params:
          q: query
      - extract: "$.results"
      - type: json
        select: ["repo_name", "is_official", "pull_count", "short_description"]
      - type: truncate
        max_items: 10
      - type: format
        template: "- {repo_name} ({pull_count} pulls) - {short_description}"

  - name: tags
    description: List available tags for a Docker Hub repository
    output: text
    request:
      method: GET
      path: /repositories/{{namespace}}/{{repo}}/tags
    params:
      - name: namespace
        type: string
        required: true
        description: "Repository namespace or username (use 'library' for official images)"
        example: "library"
        in: path
      - name: repo
        type: string
        required: true
        description: Repository name
        example: "nginx"
        in: path
      - name: page_size
        type: int
        default: "10"
        description: Number of tags per page (max 100)
        in: query
      - name: page
        type: int
        default: "1"
        description: Page number for pagination
        in: query
      - name: ordering
        type: string
        description: "Sort order: last_updated, -last_updated, name, -name"
        in: query
    assert:
      - type: status
        values: [200]
    transform:
      - extract: "$.results"
      - type: json
        select: ["name", "full_size", "last_updated"]
      - type: truncate
        max_items: 20
      - type: format
        template: "- {name} ({full_size} bytes, updated {last_updated})"
