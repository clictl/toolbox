name: docker-hub
description: Docker Hub API for searching container images and browsing repository tags
version: "1.0"
category: developer
tags: [docker, containers, images, registry, devops]
protocol: rest
owner_name: Docker Inc.
website: https://hub.docker.com
support_url: https://docs.docker.com/docker-hub/
pricing_model: freemium

connection:
  base_url: https://hub.docker.com/v2
  timeout: 15s
  headers:
    Accept: application/json

auth:
  - type: none

actions:
  - name: search
    description: Search Docker Hub for container images by keyword
    method: GET
    path: /search/repositories
    params:
      - name: query
        type: string
        required: true
        description: Search query string
        in: query
      - name: page_size
        type: int
        default: "10"
        description: Number of results per page (max 100)
        in: query
      - name: page
        type: int
        default: "1"
        description: Page number for pagination
        in: query
    assert:
      - status: [200]
    transform:
      - extract: "$.results"
      - truncate: { max_items: 20 }

  - name: tags
    description: List available tags for a Docker Hub repository
    method: GET
    path: /repositories/{{namespace}}/{{repo}}/tags
    params:
      - name: namespace
        type: string
        required: true
        description: "Repository namespace or username (use 'library' for official images)"
        in: path
      - name: repo
        type: string
        required: true
        description: Repository name
        in: path
      - name: page_size
        type: int
        default: "10"
        description: Number of tags per page (max 100)
        in: query
      - name: page
        type: int
        default: "1"
        description: Page number for pagination
        in: query
      - name: ordering
        type: string
        description: "Sort order: last_updated, -last_updated, name, -name"
        in: query
    assert:
      - status: [200]
    transform:
      - extract: "$.results"
      - truncate: { max_items: 20 }
