name: doc
description: Read, create, or edit .docx documents with formatting and layout fidelity
version: "1.0"
category: productivity
tags:
- skill
- documents
- docx
- word
- writing
protocol: skill
owner_name: OpenAI
namespace: openai
website: https://github.com/openai/skills
support_url: https://github.com/openai/skills/issues
pricing_model: free
license: MIT
source:
  type: github
  repo: openai/skills
  path: skills/.curated/doc/
  ref: main
  files:
  - name: LICENSE.txt
  - name: SKILL.md
  - name: agents/openai.yaml
  - name: assets/doc-small.svg
  - name: assets/doc.png
  - name: scripts/render_docx.py
platforms:
- name: claude-code
  install_method: skill
  config_path: .claude/skills/
- name: cursor
  install_method: skill
  config_path: .cursor/skills/
- name: codex
  install_method: skill
  config_path: .codex/skills/
- name: vscode
  install_method: copy
  config_path: .github/skills/
skill_metadata:
  author: openai
  version: '1.0'
auth:
- type: none
requires_system:
- name: python3
  check: python3 --version
  brew: python3
- name: soffice
  check: soffice --version
  brew: libreoffice
- name: pdftoppm
  check: pdftoppm -v
  brew: poppler
runtime:
  language: python
  manager: uvx
  dependencies:
  - python-docx
  - pdf2image
