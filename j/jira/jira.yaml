name: jira
description: Jira REST API for issue tracking, project management, and agile workflows
version: "1.0"
category: productivity
tags: [jira, issues, project-management, agile, atlassian, tickets]
protocol: rest
owner_name: Atlassian
website: https://www.atlassian.com/software/jira
support_url: https://developer.atlassian.com/cloud/jira/platform/rest/v3
pricing_model: freemium

connection:
  base_url: https://your-domain.atlassian.net/rest/api/3
  timeout: 15s
  headers:
    Accept: application/json

auth:
  - type: api_key
    key_env: JIRA_API_TOKEN
    inject:
      location: header
      key: Authorization
      prefix: "Bearer "

actions:
  - name: search-issues
    description: Search for issues using JQL (Jira Query Language)
    method: GET
    path: /search
    params:
      - name: jql
        type: string
        required: true
        description: "JQL query string, e.g. 'project = PROJ AND status = Open'"
        in: query
      - name: maxResults
        type: int
        default: "20"
        description: Maximum number of issues to return
        in: query
      - name: fields
        type: string
        default: "summary,status,assignee,priority,created"
        description: Comma-separated list of fields to include in the response
        in: query
    assert:
      - status: [200]
    transform:
      - extract: "$.issues"
      - truncate: { max_items: 20 }

  - name: issue
    description: Get a single issue by its key, including summary, status, and description
    method: GET
    path: /issue/{{issue_key}}
    params:
      - name: issue_key
        type: string
        required: true
        description: "Issue key, e.g. 'PROJ-123'"
        in: path
      - name: fields
        type: string
        description: Comma-separated list of fields to include
        in: query
    assert:
      - status: [200]
    transform:
      - extract: "$.fields"
      - select: ["summary", "status", "assignee", "priority", "description", "created", "updated"]

  - name: projects
    description: List all projects visible to the authenticated user
    method: GET
    path: /project
    params:
      - name: maxResults
        type: int
        default: "20"
        description: Maximum number of projects to return
        in: query
    assert:
      - status: [200]
    transform:
      - truncate: { max_items: 20 }

  - name: project
    description: Get details for a specific project by key or ID
    method: GET
    path: /project/{{project_key}}
    params:
      - name: project_key
        type: string
        required: true
        description: "Project key or ID, e.g. 'PROJ'"
        in: path
    assert:
      - status: [200]
    transform:
      - extract: "$"
      - select: ["key", "name", "description", "lead", "projectTypeKey"]
