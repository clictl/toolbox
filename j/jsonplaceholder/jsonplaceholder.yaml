spec: "1.0"
name: jsonplaceholder
description: Free fake REST API for testing and prototyping with users, posts, comments, todos, and more
version: "1.0"
category: data
tags: [testing, mock, fake, placeholder, rest, demo]

server:
  type: http
  url: https://jsonplaceholder.typicode.com
  timeout: 10s
  headers:
    Accept: application/json

actions:
  - name: posts
    description: List all posts or get a specific post by ID
    output: json
    request:
      method: GET
      path: /posts/{{#id}}{{id}}{{/id}}
    transform:
      - type: truncate
        max_items: 10
      - type: json
        select: ["id", "title", "userId"]
    params:
      - name: id
        type: int
        description: Post ID (omit to list all posts)
        example: 1
      - name: userId
        type: int
        description: Filter posts by user ID
        example: 1
        in: query

  - name: create_post
    description: Create a new post (simulated, returns the created object with an ID)
    output: json
    request:
      method: POST
      path: /posts
    params:
      - name: title
        type: string
        required: true
        description: Post title
        example: "Hello World"
        in: body
      - name: body
        type: string
        required: true
        description: Post content
        example: "This is a test post."
        in: body
      - name: userId
        type: int
        required: true
        description: Author user ID
        example: 1
        in: body

  - name: comments
    description: Get comments on a specific post
    output: json
    request:
      method: GET
      path: /posts/{{postId}}/comments
    params:
      - name: postId
        type: int
        required: true
        description: Post ID to get comments for
        example: 1
        in: path

  - name: users
    description: List all users or get a specific user by ID
    output: json
    request:
      method: GET
      path: /users/{{#id}}{{id}}{{/id}}
    params:
      - name: id
        type: int
        description: User ID (omit to list all users)
        example: 1

  - name: todos
    description: List all todos or filter by completion status
    output: json
    request:
      method: GET
      path: /todos
    params:
      - name: completed
        type: string
        description: "Filter by status: 'true' or 'false'"
        in: query
      - name: userId
        type: int
        description: Filter todos by user ID
        in: query
